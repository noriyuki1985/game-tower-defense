<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>King Builder Defense</title>
<style>
  :root{
    --ink:#2c2016; --parch:#f3e3bf; --parch-d:#e3cd9c; --wood:#8a5a32; --wood-d:#5e3c20;
    --gold:#f3c14a; --green:#57a85a; --red:#d2483f; --blue:#4da3ff;
    --lv1:#4da3ff; --lv2:#57c66b; --lv3:#f0c94a; --lv4:#e45858;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#1d2417;overflow:hidden;
    font-family:"Yu Gothic","YuGothic","Hiragino Maru Gothic ProN","Hiragino Sans","Trebuchet MS",system-ui,sans-serif;
    color:var(--ink); user-select:none; touch-action:none;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 80% at 50% 0%,#33402a,#161d12 70%);}
  #frame{position:relative;height:100%;aspect-ratio:480/800;max-width:100%;}
  canvas{display:block;width:100%;height:100%;image-rendering:auto;cursor:crosshair;
    border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.55), inset 0 0 0 3px rgba(0,0,0,.25);}
  /* top HUD */
  #hud{position:absolute;left:0;right:0;top:0;padding:8px 10px;display:flex;gap:8px;align-items:center;
    pointer-events:none;}
  .pill{pointer-events:none;display:flex;align-items:center;gap:6px;background:rgba(243,227,191,.92);
    border:2px solid var(--wood-d);border-radius:999px;padding:4px 10px;font-weight:800;font-size:14px;
    box-shadow:0 3px 0 rgba(94,60,32,.5);white-space:nowrap;}
  .pill img{width:18px;height:18px;display:block;}
  #hpwrap{flex:1;min-width:60px;}
  #hpbar{position:relative;height:16px;border-radius:999px;background:rgba(0,0,0,.28);
    border:2px solid var(--wood-d);overflow:hidden;box-shadow:0 3px 0 rgba(94,60,32,.5);}
  #hpfill{position:absolute;inset:0;width:100%;
    background:linear-gradient(180deg,#ff8a6f,#d2483f);transition:width .18s;}
  #hptext{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.6);}
  /* menu button / settings */
  .btn{pointer-events:auto;cursor:pointer;width:42px;height:42px;border-radius:12px;border:2px solid var(--wood-d);
    background:rgba(243,227,191,.94);font-size:18px;font-weight:800;color:var(--ink);
    display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 rgba(94,60,32,.55);}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(94,60,32,.55);}
  #bMenu{margin-left:auto;flex:0 0 auto;}
  .settings-card{max-width:350px;}
  .settings-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px;}
  .setting-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:rgba(255,250,235,.52);border:2px solid rgba(94,60,32,.55);border-radius:12px;padding:9px 10px;}
  .setting-row strong{font-size:13px;color:#4a331d;}
  .setting-row span{font-size:12px;color:#6b5436;font-weight:800;}
  .mini-btn{cursor:pointer;border:2px solid var(--wood-d);border-radius:10px;min-width:92px;padding:8px 10px;
    background:linear-gradient(180deg,#fff2ca,#dfc389);font-weight:900;color:#2c2016;box-shadow:0 3px 0 rgba(94,60,32,.45);}
  .mini-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(94,60,32,.45);}
  .menu-note{font-size:12px;line-height:1.45;color:#5e3c20;text-align:left;margin:10px 0 0;font-weight:700;}

  .stage-panel{margin:10px 0 14px;padding:10px;border:2px solid rgba(94,60,32,.55);border-radius:14px;background:rgba(255,250,235,.54);text-align:left;}
  .stage-panel label{display:block;font-size:12px;font-weight:900;color:#5e3c20;margin-bottom:6px;}
  .stage-panel select,.stage-select-mini{width:100%;border:2px solid var(--wood-d);border-radius:10px;background:#fff4cf;color:#2c2016;font-weight:900;padding:9px 10px;font-size:13px;}
  .stage-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .stage-chip{display:inline-flex;align-items:center;gap:4px;max-width:100%;border:1.5px solid rgba(94,60,32,.45);border-radius:999px;background:rgba(255,255,255,.45);padding:3px 7px;font-size:11px;font-weight:900;color:#4a331d;white-space:nowrap;}
  .stage-desc{margin-top:7px;font-size:12px;line-height:1.35;color:#4a3a26;font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .stage-diag{margin-top:7px;font-size:11px;line-height:1.35;color:#6b5436;font-weight:800;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .stage-map{position:relative;height:268px;margin:12px 0 12px;border:2px solid rgba(94,60,32,.55);border-radius:24px;overflow:hidden;
    background:radial-gradient(ellipse at 42% 48%,#d9c68d 0 26%,#87c57b 27% 47%,#5ab0c6 48% 64%,#3c82a5 100%);
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.22), inset 0 -18px 28px rgba(30,70,80,.22);}
  .stage-map:before{content:"";position:absolute;left:8%;right:8%;top:8%;bottom:8%;border-radius:48% 42% 50% 44%;
    background:radial-gradient(circle at 25% 30%,rgba(255,245,180,.45),transparent 18%),radial-gradient(circle at 72% 25%,rgba(255,255,255,.46),transparent 20%),
      linear-gradient(135deg,rgba(116,178,92,.72),rgba(205,180,98,.72) 50%,rgba(221,226,235,.72));
    filter:blur(.2px);box-shadow:0 8px 18px rgba(0,0,0,.20);}
  .stage-map:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 22%,rgba(255,255,255,.55),transparent 18%),radial-gradient(circle at 12% 82%,rgba(255,238,164,.42),transparent 18%);pointer-events:none;}
  .stage-map-line{position:absolute;height:6px;transform-origin:left center;background:repeating-linear-gradient(90deg,rgba(255,255,255,.75) 0 8px,rgba(255,255,255,0) 8px 16px);
    border-radius:999px;filter:drop-shadow(0 2px 1px rgba(60,70,60,.35));z-index:1;}
  .stage-map-line.done{background:linear-gradient(90deg,#ffe389,#fff7c7);}
  .stage-node{position:absolute;z-index:2;min-width:76px;max-width:86px;transform:translate(-50%,-50%);border:3px solid #5e3c20;border-radius:18px;
    background:linear-gradient(180deg,#fff7c7,#f1c86e);box-shadow:0 5px 0 rgba(94,60,32,.55),0 0 0 3px rgba(255,255,255,.28);
    color:#2c2016;font-weight:900;font-size:11px;line-height:1.05;padding:7px 5px;cursor:pointer;text-align:center;}
  .stage-node .stage-node-mark{display:block;font-size:18px;line-height:1;margin-bottom:2px;}
  .stage-node .stage-node-name{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .stage-node.locked{cursor:not-allowed;filter:grayscale(.85);opacity:.62;background:linear-gradient(180deg,#d5d0c2,#a5a196);box-shadow:0 4px 0 rgba(75,70,62,.48);}
  .stage-node.cleared{background:linear-gradient(180deg,#fff3a8,#f0b84b);}
  .stage-node.selected{outline:4px solid rgba(88,196,255,.75);box-shadow:0 5px 0 rgba(94,60,32,.55),0 0 18px rgba(111,212,255,.90);}
  .stage-node.next{animation:stagePulse 1.6s ease-in-out infinite;}
  @keyframes stagePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
  .stage-map-note{margin:-3px 0 8px;font-size:11px;line-height:1.35;font-weight:800;color:#5e3c20;text-align:left;}
  .progress-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:7px;font-size:11px;font-weight:900;color:#5e3c20;}
  .link-btn{border:none;background:transparent;color:#5e3c20;text-decoration:underline;font-weight:900;cursor:pointer;padding:2px 0;font-size:11px;}
  @media (max-width:520px){
    .card{padding:18px 16px 16px;max-width:332px;}
    .stage-panel{padding:8px;margin:8px 0 12px;}
    .stage-map{height:232px;margin:8px 0 10px;border-radius:20px;}
    .stage-node{min-width:64px;max-width:70px;font-size:10px;padding:6px 4px;border-radius:15px;}
    .stage-node .stage-node-mark{font-size:16px;}
    .stage-desc{display:none;}
    .stage-diag{-webkit-line-clamp:1;}
    .stage-chip{font-size:10.5px;padding:2px 6px;}
  }
  /* wave banner / hint */
  #hint{position:absolute;left:10px;right:60px;bottom:12px;pointer-events:none;
    background:rgba(44,32,22,.82);color:#f3e3bf;border-radius:10px;padding:7px 11px;font-size:12.5px;
    font-weight:600;line-height:1.35;opacity:0;transition:opacity .25s;backdrop-filter:blur(2px);}
  #hint.show{opacity:1;}
  /* overlays */
  .ov{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;
    text-align:center;padding:24px;background:rgba(20,26,16,.78);backdrop-filter:blur(3px);z-index:5;
    overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
  .ov.show{display:flex;}
  .card{background:linear-gradient(180deg,#f6e8c6,#e7d09f);border:3px solid var(--wood-d);border-radius:18px;
    padding:22px 22px 20px;max-width:340px;width:100%;margin:auto;box-shadow:0 14px 0 rgba(94,60,32,.5),0 24px 50px rgba(0,0,0,.5);}
  .card h1{margin:0 0 4px;font-size:27px;letter-spacing:1px;color:var(--wood-d);text-shadow:0 2px 0 rgba(255,255,255,.4);}
  .card .sub{margin:0 0 14px;font-size:13px;color:#6b5436;font-weight:700;}
  .card p{font-size:13px;line-height:1.55;color:#4a3a26;margin:0 0 16px;text-align:left;font-weight:600;}
  .card p b{color:var(--wood-d);}
  .cta{cursor:pointer;display:block;width:100%;border:none;border-radius:12px;padding:13px;font-size:17px;font-weight:900;
    color:#fff;background:linear-gradient(180deg,#6fbf6b,#3f8a45);box-shadow:0 5px 0 #2c6731;letter-spacing:1px;}
  .cta:active{transform:translateY(3px);box-shadow:0 2px 0 #2c6731;}
  .cta.alt{background:linear-gradient(180deg,#e8c45c,#c79a32);box-shadow:0 5px 0 #936f1f;margin-top:9px;color:#3a2a16;}
  .cta.alt:active{box-shadow:0 2px 0 #936f1f;}
  .legend{display:flex;gap:10px;justify-content:center;margin:2px 0 14px;flex-wrap:wrap;}
  .legend span{font-size:11px;font-weight:800;color:#5e3c20;display:flex;align-items:center;gap:4px;}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block;border:1.5px solid rgba(0,0,0,.3);}
  #loadbar{margin-top:10px;height:10px;border-radius:999px;background:rgba(0,0,0,.2);overflow:hidden;border:2px solid var(--wood-d);}
  #loadfill{height:100%;width:0;background:var(--green);transition:width .15s;}
</style>
</head>
<body>
<div id="stage"><div id="frame">
  <canvas id="cv" width="480" height="800"></canvas>

  <div id="hud">
    <div class="pill"><img id="coinIcon" alt="">‎<span id="coinVal">0</span></div>
    <div id="hpwrap"><div id="hpbar"><div id="hpfill"></div><div id="hptext">城 100%</div></div></div>
    <div class="pill"><img id="waveIcon" alt="">‎<span id="waveVal">0/8</span></div>
    <button class="btn" id="bMenu" title="設定メニュー" aria-label="設定メニュー">☰</button>
  </div>

  <div id="hint"></div>

  <!-- Settings -->
  <div class="ov" id="ovSettings">
    <div class="card settings-card">
      <h1>設定</h1>
      <p class="sub">メニュー表示中はゲームを一時停止</p>
      <div class="settings-grid">
        <div class="setting-row"><div><strong>ステージ</strong><br><span id="sStageVal">再開始時に反映</span></div><select class="stage-select-mini" id="sStageSelect" aria-label="ステージ選択"><option value="meadow" selected>草地の前線 / 標準 / 2ルート</option></select></div>
        <div class="setting-row"><div><strong>速度</strong><br><span id="sSpeedVal">1x</span></div><button class="mini-btn" id="sSpeed">速度 1x</button></div>
        <div class="setting-row"><div><strong>一時停止</strong><br><span id="sPauseVal">進行中</span></div><button class="mini-btn" id="sPause">一時停止</button></div>
        <div class="setting-row"><div><strong>音</strong><br><span id="sMuteVal">ON</span></div><button class="mini-btn" id="sMute">音: ON</button></div>
      </div>
      <p class="menu-note">誤操作を避けるため、倍速・停止・音量はこのメニューに集約しています。</p>
      <button class="cta alt" id="sRetry">最初からやり直す</button>
      <button class="cta" id="sClose">ゲームに戻る</button>
    </div>
  </div>

  <!-- Start / Stage Select -->
  <div class="ov show" id="ovStart">
    <div class="card stage-select-card">
      <h1>ステージ選択</h1>
      <p class="sub">クリアすると次の前線が解放される</p>
      <div class="stage-map" id="stageMap" aria-label="ステージマップ"></div>
      <p class="stage-map-note">王冠はクリア済み、鍵は未解放。ステージを選び、出陣すると防衛戦が始まる。</p>

      <div class="stage-panel" id="stagePanel">
        <label for="stageSelect">選択中のステージ</label>
        <select id="stageSelect" aria-label="ステージ選択"><option value="meadow" selected>草地の前線 / 標準 / 2ルート</option></select>
        <div class="stage-chips" id="stageChips"></div>
        <div class="stage-desc" id="stageDesc"></div>
        <div class="stage-diag" id="stageDiag"></div>
        <div class="progress-row"><span id="progressText">進行状況</span><button class="link-btn" id="bResetProgress" type="button">進行リセット</button></div>
      </div>
      <button class="cta" id="bStart">このステージへ出陣</button>
      <div id="loadbar"><div id="loadfill"></div></div>
    </div>
  </div>

  <!-- Result -->
  <div class="ov" id="ovEnd">
    <div class="card">
      <h1 id="endTitle">勝利</h1>
      <p class="sub" id="endSub"></p>
      <p id="endBody"></p>
      <button class="cta" id="bNext">次のステージへ</button>
      <button class="cta alt" id="bRetry">もう一度</button>
      <button class="cta alt" id="bMap">ステージ選択へ</button>
    </div>
  </div>
</div></div>

<script>
"use strict";
(function(){
/* =====================================================================
 * King Builder Defense  v4.6.6  (mobile early-start boot preserve fix)
 * 単一ファイル / vanilla JS / Canvas2D / localStorageのみ / 外部通信なし
 * ===================================================================== */

const VERSION = "v4.6.7";
const W = 480, H = 800;
const SAVE_KEY = "kbd-v467-save";

/* ---------------- assets ---------------- */
const A = "assets/images/";
const IMG_SRC = {
  castle: A+"castle/castle_keep.png",
  king_idle1: A+"king/idle/king_idle_1.png",
  king_idle2: A+"king/idle/king_idle_2.png",
  king_idle3: A+"king/idle/king_idle_3.png",
  king_idle4: A+"king/idle/king_idle_4.png",
  king_run1: A+"king/run/king_run_1.png",
  king_run2: A+"king/run/king_run_2.png",
  king_run3: A+"king/run/king_run_3.png",
  king_run4: A+"king/run/king_run_4.png",
  king_attack_bow: A+"king/attack/king_attack_bow.png",
  king_hit: A+"king/hit/king_hit.png",
  king_down: A+"king/king_down.png",
  king_hurt: A+"king/king_hurt.png",
  coin: A+"ui/ui_coin.png",
  wave: A+"ui/ui_wave.png",
  // buildings lv1-4
  // enemies + allies + fx loaded below
};
const BUILD_TYPES = ["palisade","archer","cannon","barracks","mine"];
const BUILD_FILE = {palisade:"palisade",archer:"archer_tower",cannon:"cannon",barracks:"barracks",mine:"gold_mine"};
BUILD_TYPES.forEach(t=>{ for(let L=1;L<=4;L++) IMG_SRC[`b_${t}_${L}`]=A+`buildings/levels/building_${BUILD_FILE[t]}_lv${L}.png`; });
IMG_SRC.b_attack_archer=A+"buildings/attack/building_archer_tower_attack.png";
IMG_SRC.b_attack_cannon=A+"buildings/attack/building_cannon_attack.png";
const ENEMY_KINDS = ["grunt","runner","brute","shield","saboteur","bomber","shaman","siege","warlord","overlord"];
ENEMY_KINDS.forEach(k=> IMG_SRC[`e_${k}`]=A+`enemies/enemy_${k==="siege"?"siege_ram":k}.png`);
ENEMY_KINDS.forEach(k=> IMG_SRC[`e_walk_${k}`]=A+`enemies/walk/enemy_${k}_walk.png`);
ENEMY_KINDS.forEach(k=> IMG_SRC[`e_attack_${k}`]=A+`enemies/attack/enemy_${k}_attack.png`);
IMG_SRC.e_destroy_siege=A+"enemies/destroy/enemy_siege_destroy.png";
IMG_SRC.ally1=A+"allies/ally_spear.png";
["1","2","3","4"].forEach(n=> IMG_SRC[`ally_w${n}`]=A+`allies/walk/ally_spear_walk_${n}.png`);
["1","2","3","4"].forEach(n=> IMG_SRC[`ally_a${n}`]=A+`allies/attack/ally_spear_attack_${n}.png`);
IMG_SRC.ally_archer=A+"allies/ally_archer.png";
["1","2","3","4"].forEach(n=> IMG_SRC[`ally_archer_w${n}`]=A+`allies/walk/ally_archer_walk_${n}.png`);
["1","2","3","4"].forEach(n=> IMG_SRC[`ally_archer_a${n}`]=A+`allies/attack/ally_archer_attack_${n}.png`);
["explosion","hit","upgrade","build","coin_pickup"].forEach(f=>{ for(let i=1;i<=3;i++) IMG_SRC[`fx_${f}_${i}`]=A+`effects/frames/fx_${f}_${i}.png`; });
IMG_SRC.tree=A+"backgrounds/parts/part_tree_round_soft_01.png";
IMG_SRC.rock=A+"backgrounds/parts/part_rock_cluster_soft_01.png";
IMG_SRC.shadow=A+"backgrounds/parts/part_shadow_blob_soft_01.png";
IMG_SRC.mist=A+"backgrounds/parts/part_mist_veil_soft_01.png";

const IMG = {};
let loaded=0, total=Object.keys(IMG_SRC).length;
function loadAll(done){
  Object.entries(IMG_SRC).forEach(([k,src])=>{
    const im=new Image();
    im.onload=()=>{ IMG[k]=im; tick(); };
    im.onerror=()=>{ tick(); };  // tolerate a missing asset
    im.src=src;
  });
  function tick(){ loaded++; const f=$("loadfill"); if(f) f.style.width=Math.round(loaded/total*100)+"%"; if(loaded>=total) done(); }
}
function ready(k){ return IMG[k] && IMG[k].complete && IMG[k].naturalWidth>0; }
function sprite(k,x,y,h,o){
  o=o||{}; const im=IMG[k]; if(!im||!im.naturalWidth) return false;
  const w=im.naturalWidth/im.naturalHeight*h;
  ctx.save();
  ctx.translate(x,y);
  if(o.rot) ctx.rotate(o.rot);
  const sx=(o.flip?-1:1)*(o.sx||1), sy=(o.sy||1);
  ctx.scale(sx,sy);
  if(o.alpha!=null) ctx.globalAlpha=o.alpha;
  // anchor bottom-center by default
  const ax=o.ax!=null?o.ax:0.5, ay=o.ay!=null?o.ay:1.0;
  ctx.drawImage(im, -w*ax, -h*ay, w, h);
  ctx.restore();
  return true;
}

function spriteFrame(k,x,y,h,frames,frame,o){
  o=o||{}; const im=IMG[k]; if(!im||!im.naturalWidth) return false;
  frames=frames||4; frame=((Math.floor(frame||0)%frames)+frames)%frames;
  const sw=im.naturalWidth/frames, sh=im.naturalHeight;
  const w=sw/sh*h;
  ctx.save();
  ctx.translate(x,y);
  if(o.rot) ctx.rotate(o.rot);
  const sx=(o.flip?-1:1)*(o.sx||1), sy=(o.sy||1);
  ctx.scale(sx,sy);
  if(o.alpha!=null) ctx.globalAlpha=o.alpha;
  const ax=o.ax!=null?o.ax:0.5, ay=o.ay!=null?o.ay:1.0;
  ctx.drawImage(im, sw*frame, 0, sw, sh, -w*ax, -h*ay, w, h);
  ctx.restore();
  return true;
}


// Actor sprites are generated from different canvases. These helpers crop transparent padding
// per image/frame before drawing so visible character height stays consistent across animations.
const TRIM_CACHE = Object.create(null);
const DRAW_SIZE = {
  king: 52,
  ally: 34,
  enemy:{grunt:42,runner:39,brute:52,shield:46,saboteur:44,bomber:45,shaman:47,siege:58,warlord:64,overlord:70}
};
const BUILD_DRAW_HEIGHT = {palisade:54,archer:62,cannon:60,barracks:60,mine:54};
const BUILD_RENDER_SCALE = {palisade:1.16,archer:1.24,cannon:1.24,barracks:1.26,mine:1.18};
function trimBox(k,frames,frame){
  const im=IMG[k]; if(!im||!im.naturalWidth) return null;
  frames=frames||1; frame=((Math.floor(frame||0)%frames)+frames)%frames;
  const cacheKey=`${k}:${frames}:${frame}`;
  if(TRIM_CACHE[cacheKey]) return TRIM_CACHE[cacheKey];
  const sw=Math.floor(im.naturalWidth/frames), sh=im.naturalHeight;
  const srcX=Math.floor(sw*frame);
  let box={sx:srcX,sy:0,sw,sh};
  try{
    const c=document.createElement('canvas'); c.width=sw; c.height=sh;
    const g=c.getContext('2d',{willReadFrequently:true});
    g.drawImage(im,srcX,0,sw,sh,0,0,sw,sh);
    const data=g.getImageData(0,0,sw,sh).data;
    let minX=sw,minY=sh,maxX=-1,maxY=-1;
    for(let y=0;y<sh;y++){
      for(let x=0;x<sw;x++){
        if(data[(y*sw+x)*4+3]>10){
          if(x<minX) minX=x; if(x>maxX) maxX=x;
          if(y<minY) minY=y; if(y>maxY) maxY=y;
        }
      }
    }
    if(maxX>=0){
      const pad=3;
      minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad);
      maxX=Math.min(sw-1,maxX+pad); maxY=Math.min(sh-1,maxY+pad);
      box={sx:srcX+minX,sy:minY,sw:maxX-minX+1,sh:maxY-minY+1};
    }
  }catch(e){}
  TRIM_CACHE[cacheKey]=box;
  return box;
}
function spriteTrim(k,x,y,h,o){
  o=o||{}; const im=IMG[k]; if(!im||!im.naturalWidth) return false;
  const b=trimBox(k,1,0); if(!b) return sprite(k,x,y,h,o);
  const w=b.sw/b.sh*h;
  ctx.save(); ctx.translate(x,y);
  if(o.rot) ctx.rotate(o.rot);
  const sx=(o.flip?-1:1)*(o.sx||1), sy=(o.sy||1); ctx.scale(sx,sy);
  if(o.alpha!=null) ctx.globalAlpha=o.alpha;
  const ax=o.ax!=null?o.ax:0.5, ay=o.ay!=null?o.ay:1.0;
  ctx.drawImage(im,b.sx,b.sy,b.sw,b.sh,-w*ax,-h*ay,w,h);
  ctx.restore(); return true;
}

    if(this.muted||!this.ctx) return;
    const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();

function normalizeProgress(data){
  const unlocked=new Set(Array.isArray(data.unlockedStages)?data.unlockedStages:["meadow"]);
  const cleared=new Set(Array.isArray(data.clearedStages)?data.clearedStages:[]);
  unlocked.add("meadow");
  for(const id of [...cleared]){ const i=STAGE_ORDER.indexOf(id); if(i>=0){ unlocked.add(id); if(STAGE_ORDER[i+1]) unlocked.add(STAGE_ORDER[i+1]); } }
  return {unlockedStages:[...unlocked].filter(id=>STAGE_DEFS[id]), clearedStages:[...cleared].filter(id=>STAGE_DEFS[id])};
}
function isStageUnlocked(id){ return normalizeProgress(getSaveData()).unlockedStages.includes(id); }
function firstUnlockedStage(){ return normalizeProgress(getSaveData()).unlockedStages.find(id=>STAGE_DEFS[id])||"meadow"; }
function normalizeSelectedStage(id){ return (STAGE_DEFS[id] && isStageUnlocked(id)) ? id : firstUnlockedStage(); }

const rand=(a,b)=>a+Math.random()*(b-a);

function mulberry(seed){ return function(){ let t=seed+=0x6D2B79F5; t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61); return ((t^t>>>14)>>>0)/4294967296; }; }

    nextId:1, message:"", messageT:0, killsThisWave:0,
  };

function buildProps(){
  const rnd=mulberry(20240611); const props=[];
  for(let i=0;i<26;i++){
    const x=rnd()*W, y=80+rnd()*(H-120);
    if(distToAnyRoute(x,y)<54) { i--; continue; }
    if(dist(x,y,CASTLE.x,CASTLE.y)<70){ i--; continue; }
    let bad=false; for(const s of SLOTS){ if(dist(x,y,s.x,s.y)<46){bad=true;break;} }
    if(bad){ i--; continue; }
    const isRock=rnd()<0.32;
    props.push({x,y,h:isRock?rand(20,30):rand(34,52),img:isRock?"rock":"tree",sway:rnd()*6.28,swA:isRock?0:rand(0.6,1.4)});
  }
  props.sort((a,b)=>a.y-b.y);
  return props;
}
function distToSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay; const l2=dx*dx+dy*dy||1;
  let t=((px-ax)*dx+(py-ay)*dy)/l2; t=clamp(t,0,1);
  return Math.hypot(px-(ax+dx*t),py-(ay+dy*t));
}
function distToRoute(px,py,pts){
  let m=1e9; for(let i=0;i<pts.length-1;i++) m=Math.min(m,distToSeg(px,py,pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y)); return m;
}
function distToAnyRoute(x,y){
  const routes=Object.values(ROUTE);
  if(!routes.length) return 1e9;
  return Math.min(...routes.map(r=>distToRoute(x,y,r)));
}

/* =====================================================================
 * UPDATE
 * ===================================================================== */
function update(dt){
  if(!S || S.status!=="playing") return;
  S.time+=dt;
  // hitstop slows the world but keeps king/menu responsive enough
  let wdt=dt;
  if(S.hitstop>0){ S.hitstop-=dt; wdt=dt*0.18; }
  S.shake=Math.max(0,S.shake-dt);
  S.flash=Math.max(0,S.flash-dt*0.004);
  if(S.messageT>0) S.messageT-=dt;

  updateKing(dt);
  updateMenu();
  updateWaves(wdt);
  updateFacilities(wdt);
  updateSoldiers(wdt);
  updateEnemies(wdt);
  updateKingHurt(wdt);
  updateKingAttack(wdt);
  updateProjectiles(wdt);
  updateCoins(dt);
  updateParticles(wdt);
  for(const r of S.rings) r.t+=wdt;
  S.rings=S.rings.filter(r=>r.t<r.life);
  for(const f of S.floaters){ f.t+=dt; f.y-=dt*0.022; }
  S.floaters=S.floaters.filter(f=>f.t<f.life);
  for(const m of S.mist){ m.x+=wdt*0.012*m.s; if(m.x>W+120) m.x=-120; }
  if(S.banner){ S.banner.t+=dt; if(S.banner.t>S.banner.life) S.banner=null; }
}

function updateKing(dt){
  const k=S.king;
  const dx=k.tx-k.x, dy=k.ty-k.y, d=Math.hypot(dx,dy);
  const step=BAL.kingSpeed*dt/1000;
  if(d>2){
    k.moving=true;
    k.x+=dx/d*Math.min(step,d); k.y+=dy/d*Math.min(step,d);
    if(Math.abs(dx)>1.2) k.facing=dx<0?-1:1;
    k.anim+=dt*0.012;
    k.squash=1+Math.sin(k.anim*2.0)*0.06;
    k.dust+=dt;
    if(k.dust>110){ k.dust=0; S.particles.push({x:k.x,y:k.y,vx:rand(-12,12),vy:rand(-4,-22),life:420,t:0,r:rand(3,6),c:"rgba(210,190,150,0.6)",grav:0.02}); }
  } else {
    k.moving=false; k.x=k.tx; k.y=k.ty; k.anim+=dt*0.004;
    k.squash+=(1-k.squash)*0.2;
  }
  k.x=clamp(k.x,14,W-14); k.y=clamp(k.y,96,H-14);
  if(k.build>0) k.build-=dt;
  k.attackCd=Math.max(0,(k.attackCd||0)-dt);
  k.attackFlash=Math.max(0,(k.attackFlash||0)-dt);
  k.hurt=Math.max(0,(k.hurt||0)-dt);
  k.hurtCd=Math.max(0,(k.hurtCd||0)-dt);
  k.hurtFlash=Math.max(0,(k.hurtFlash||0)-dt);
  const prevWindup=k.attackWindup||0;
  k.attackWindup=Math.max(0,(k.attackWindup||0)-dt);
  if(prevWindup>0 && !k.attackReleased && k.attackWindup<=BAL.kingAttackWindup*0.38){
    const target=(S.enemies||[]).find(e=>e.id===k.attackTarget && !e.dead) || nearestEnemy(k.x,k.y,BAL.kingAttackRange*1.15);
    if(target){
      const dx=target.x-k.x;
      if(Math.abs(dx)>1) k.facing=dx<0?-1:1;
      const sx=k.x + (k.facing||1)*12;
      const sy=k.y - 28;
      S.projectiles.push({x:sx,y:sy,tx:target.x,ty:target.y,target,spd:BAL.kingArrowSpeed,dmg:BAL.kingAttackDamage,c:"#ffe08a",king:true,source:"kingArrow",originX:sx,originY:sy});
      burst(sx,sy,'#fff2b5',4);
      Audio2.hit();
    }
    k.attackReleased=true;
  }
}

/* king combat: the king auto-attacks nearby enemies with a short-range bow while he is not building. */
function updateKingAttack(dt){
  const k=S.king;
  if(!k || k.build>0 || k.hurt>0 || k.attackCd>0 || k.attackWindup>0 || !S.enemies.length) return;
  const target=nearestEnemy(k.x,k.y,BAL.kingAttackRange);
  if(!target) return;
  const dx=target.x-k.x;
  if(Math.abs(dx)>1) k.facing=dx<0?-1:1;
  k.attackCd=BAL.kingAttackCd;
  k.attackFlash=BAL.kingAttackAnim;
  k.attackWindup=BAL.kingAttackWindup;
  k.attackTarget=target.id;
  k.attackX=target.x;
  k.attackY=target.y;
  k.attackReleased=false;
  ring(target.x,target.y,'#fff2a8',22,180);
}

function updateKingHurt(dt){
  const k=S.king;
  if(!k || k.hurtCd>0) return;
  let hitter=null, best=1e9;
  for(const e of S.enemies){
    if(e.dead) continue;
    const d=dist(k.x,k.y,e.x,e.y) - (e.r||10);
    if(d < BAL.kingHurtContact && d < best){ best=d; hitter=e; }
  }
  if(!hitter) return;
  const dx=k.x-hitter.x, dy=k.y-hitter.y;
  const len=Math.hypot(dx,dy)||1;
  k.hurt=BAL.kingHurtAnim;
  k.hurtCd=BAL.kingHurtCooldown;
  k.hurtFlash=BAL.kingHurtAnim*0.72;
  k.attackWindup=0;
  k.attackFlash=0;
  k.attackReleased=true;
  k.x=clamp(k.x + dx/len*BAL.kingHurtKnockback,14,W-14);
  k.y=clamp(k.y + dy/len*BAL.kingHurtKnockback,96,H-14);
  if(Math.abs(dx)>1) k.facing=dx<0?-1:1;
  burst(k.x,k.y-10,'rgba(255,245,190,0.95)',5);
  ring(k.x,k.y-12,'rgba(255,240,175,0.9)',18,180);
  Audio2.hit();
}

function nearestEnemy(x,y,range){
  let best=null, bestScore=-1;
  for(const e of S.enemies){
    if(e.dead) continue;
    const d=dist(x,y,e.x,e.y);
    if(d>range) continue;
    // prefer enemies that are closer to the castle along the path, then closer to king.
    const score=(e.seg||0)*1000-d;
    if(score>bestScore){ bestScore=score; best=e; }
  }
  return best;
}

/* slot menu: opens when king idle within range & slot not acted this visit */
function updateMenu(){
  const k=S.king; let near=null;
  for(const s of S.slots){
    s.pulse+=16; const was=s.inRange;
    s.inRange=dist(k.x,k.y,s.x,s.y)<BAL.slotRadius;
    if(!s.inRange && was) s.acted=false;     // left & may return -> re-arm
    if(s.inRange && (!near || dist(k.x,k.y,s.x,s.y)<dist(k.x,k.y,near.x,near.y))) near=s;
  }
  if(near && !k.moving){
    if(near.acted){ S.menu={slot:near,locked:true,buttons:[]}; }
    else S.menu=buildMenu(near);
  } else {
    S.menu=null;
  }
}
function buildMenu(slot){
  const buttons=[];
  const f = slot.facilityId ? S.facilities.find(x=>x.id===slot.facilityId) : null;
  if(!f){
    for(const t of ALLOWED[slot.kind]){
      const d=DEF[t];
      buttons.push({label:d.name, cost:d.cost, type:"build", t, enabled:S.coins>=d.cost});
    }
  } else {
    if(f.level<4){

      buttons.push({label:`強化 Lv.${f.level+1}`, cost:c, type:"upgrade", enabled:S.coins>=c, color:LVCOLOR[f.level+1]});

      const rc=Math.ceil((f.maxHp-f.hp)*BAL.repairCostPer);
      buttons.push({label:`修理`, cost:rc, type:"repair", enabled:S.coins>=rc});
    }
    if(f.level>=4 && f.hp>=f.maxHp-0.5){
      buttons.push({label:"最大強化・万全", cost:0, type:"none", enabled:false, info:true});
    }
  }
  return {slot,locked:false,buttons};
}
function upgradeCost(f){ const d=DEF[f.type]; return Math.round(d.baseUpgrade*Math.pow(BAL.upgradeCostMul,f.level-1)); }

function doMenuAction(btn){

function spend(c){ S.coins=Math.max(0,S.coins-c); }

function placeFacility(slot,type){
  const d=DEF[type];
  const f={ id:S.nextId++, type, x:slot.x, y:slot.y, level:1, fire:0, hp:d.hp, maxHp:d.hp,
            spawnT:600, attackT:0, spawnPulse:0, levelFlash:0, sweep:0, scale:0.2, name:d.name };

  burst(f.x,f.y,"#ffe087",22); ring(f.x,f.y,"#ffe087",60,560);

function applyLevel(f){
  const d=DEF[f.type], L=f.level;
  f.maxHp=Math.round(d.hp*STAT.hp[L-1]);
  if(f.hp==null) f.hp=f.maxHp;
  if(f.type==="archer"||f.type==="cannon"){
    f.range=d.range*STAT.range[L-1]; f.cd=d.cd*STAT.cd[L-1];
    f.dmg=d.dmg*STAT.dmg[L-1]; f.splash=(d.splash||0)*STAT.range[L-1];
  }
  if(f.type==="palisade"){ f.blockR=d.blockR; f.slow=STAT.slow[L-1]; }
  if(f.type==="barracks"){ f.cap=d.soldierCap+(L-1); f.sHp=Math.round(d.soldierHp*STAT.hp[L-1]); f.sDmg=d.soldierDmg*STAT.dmg[L-1]; f.spawn=d.spawn; }
  if(f.type==="mine"){ f.income=Math.round(d.income*STAT.income[L-1]); }
}
function upgradeFacility(f){

  addFloater("LEVEL UP!",f.x,f.y-66,"#fff3a3"); addFloater(`Lv.${f.level}`,f.x,f.y-46,c);
  if(f.level>=4){ addFloater("MAX!",f.x,f.y-86,"#ffe58f"); f.maxGlow=1600; }

function facHint(t){ const m={palisade:"敵を止めている間に、脇の塔で削る。",archer:"走り兵や抜けた敵を遠くから処理。",cannon:"敵がまとまる合流点で本領を発揮。",barracks:"兵士が前線を埋める。側道に有効。",mine:"ウェーブ後に収入。守りを薄くしすぎないこと。"}; return m[t]||""; }

/* waves */
function updateWaves(dt){
  if(S.between){
    S.waveTimer-=dt;
    if(S.waveTimer<=0) startWave();
    return;
  }
  // spawning
  if(S.spawning){
    let any=false;
    for(const q of S.spawnQueue){
      if(q.left<=0) continue; any=true;
      q.t-=dt;
      if(q.t<=0){ spawnEnemy(q.type,q.route); q.left--; q.t=q.gap; }
    }
    if(!any) S.spawning=false;
  }
  // wave clear?
  if(!S.spawning && S.enemies.length===0){
    endWave();
  }
}
function startWave(){
  S.waveIdx++; S.between=false; S.spawning=true; S.killsThisWave=0;
  const w=WAVES[S.waveIdx]; S.spawnQueue=[];
  for(const g of w.groups) S.spawnQueue.push({type:g.type,route:g.route,left:g.count,gap:g.gap,t:(g.delay||0)+200});
  S.message=`ウェーブ ${S.waveIdx+1}: ${w.note}`; S.messageT=5200;
  if(w.boss){ S.banner={text:"最終決戦",sub:WAVES[S.waveIdx].note?"":"",color:"#e45858",t:0,life:1400}; }
  syncHud();
}
function endWave(){
  // mine income paid here -> rewards early economy investment
  let inc=0; for(const f of S.facilities) if(f.type==="mine"){ inc+=f.income; }
  if(inc>0){ S.coins+=inc; addFloater(`金鉱収入 +${inc}`,CASTLE.x+30,CASTLE.y+30,"#ffd35b"); }
  if(S.waveIdx>=WAVES.length-1){ win(); return; }
  S.between=true; S.waveTimer=BAL.waveRest;
  S.message=inc>0?`ウェーブ突破。金鉱収入 +${inc}。次の手を選べ。`:"ウェーブ突破。柵・塔・金鉱、どれに投資する？";
  S.messageT=4200;
  syncHud();
}

function spawnEnemy(type,routeKey){
  const e=E[type], r=ROUTE[routeKey]||ROUTE.main||Object.values(ROUTE)[0];
  const mul=S.waveIdx>=4?1+(S.waveIdx-4)*0.06:1;  // gentle ramp late
  const st=currentStage(), em=st.enemyMul||{hp:1,damage:1,speed:1};
  const hp=e.hp*mul*(em.hp||1), spd=e.spd*(em.speed||1), dmg=e.dmg*(em.damage||1);
  S.enemies.push({ id:S.nextId++, type, route:routeKey, seg:0, t:0,
    x:r[0].x, y:r[0].y, hp, max:hp, spd, base:spd, r:e.r,
    dmg, coin:e.coin, armor:e.armor||0, boss:!!e.boss, facing:-1,
    hit:0, stun:0, bob:Math.random()*6.28, anim:Math.random()*4, kx:0, ky:0, slow:1, dead:false, atkF:0,
    attacking:false, atkFrame:0, targetFacility:!!e.targetFacility, explode:e.explode||0, heal:e.heal||0, aura:e.aura||0 });
}

function updateEnemies(dt){
  const k=S.king;
  for(const e of S.enemies){
    if(e.dead) continue;
    e.bob+=dt*0.01;
    e.hit=Math.max(0,e.hit-dt);
    e.stun=Math.max(0,e.stun-dt);
    e.kx*=0.86; e.ky*=0.86;
    e.attacking=false;
    e.atkFrame=0;
    // slow from palisades
    let slow=1;
    for(const f of S.facilities){ if(f.type==="palisade" && dist(e.x,e.y,f.x,f.y)<f.blockR){ slow=Math.min(slow,1-f.slow); } }
    e.slow=slow;
    const animMul=(e.type==="runner"||e.type==="saboteur")?1.35:(e.type==="siege"?0.72:(e.boss?0.78:1));
    const animSpeed=Math.max(0.45,e.slow||1);
    e.anim=(e.anim||0)+dt/155*animMul*animSpeed;
    if(e.attacking){ e.atkF+=dt; } else { e.atkF=Math.max(0,e.atkF-dt*1.4); }
    // shaman heals nearby
    if(e.heal){ for(const o of S.enemies){ if(o!==e && !o.dead && dist(e.x,e.y,o.x,o.y)<e.heal){ o.hp=Math.min(o.max,o.hp+dt*0.012*o.max*0.5); } } }
    if(e.stun>0){ applyKnock(e); continue; }
    // saboteur: divert to nearest facility near its path
    let attacking=null;
    if(e.targetFacility){
      let best=null,bd=70;
      for(const f of S.facilities){ const d=dist(e.x,e.y,f.x,f.y); if(d<bd){bd=d;best=f;} }
      if(best){ attacking=best; }
    }
    // palisade contact attack (anyone touching a palisade chips it)
    let didAttack=false;
    for(const f of S.facilities){
      if(f.type==="palisade" && dist(e.x,e.y,f.x,f.y)<f.blockR*0.7){
        damageFacility(f,e.dmg*dt/1000*1.4);
        e.atkF+=dt; didAttack=true;
      }
    }
    if(attacking){
      const d=dist(e.x,e.y,attacking.x,attacking.y);
      if(d>26){ moveTo(e,attacking.x,attacking.y,dt); }
      else { damageFacility(attacking,e.dmg*dt/1000*2.0); e.atkF+=dt; didAttack=true; }
      e.attacking=didAttack;
      if(didAttack) e.atkFrame=Math.floor((e.atkF%420)/105)%4;
      applyKnock(e);
      continue;
    }
    if(didAttack){
      e.attacking=true;
      e.atkFrame=Math.floor((e.atkF%420)/105)%4;
      applyKnock(e);
      continue;
    }
    // follow route
    const pts=ROUTE[e.route];
    const nx=pts[e.seg+1];
    if(!nx){ hitCastle(e); continue; }
    const dx=nx.x-e.x, dy=nx.y-e.y, d=Math.hypot(dx,dy);
    const step=e.base*e.slow*dt/1000;
    if(Math.abs(dx)>1) e.facing=dx<0?-1:1;
    if(d<=step){ e.x=nx.x; e.y=nx.y; e.seg++; }
    else { e.x+=dx/d*step; e.y+=dy/d*step; }
    applyKnock(e);
  }
  S.enemies=S.enemies.filter(e=>!e.dead);
}
function moveTo(e,tx,ty,dt){ const dx=tx-e.x,dy=ty-e.y,d=Math.hypot(dx,dy)||1; const s=e.base*e.slow*dt/1000; if(Math.abs(dx)>1)e.facing=dx<0?-1:1; e.x+=dx/d*Math.min(s,d); e.y+=dy/d*Math.min(s,d); }
function applyKnock(e){
  // Keep route position authoritative. Earlier builds added hit knockback directly to x/y,
  // which could push enemies off the path and leave them unreachable by route-based combat.
  // kx/ky are kept only as decaying hit-reaction values for future visual use.
  return e;
}
function hitCastle(e){
  S.castleHp-=e.dmg; e.dead=true; S.shake=Math.max(S.shake,160); S.flash=Math.max(S.flash,0.4);
  burst(CASTLE.x,CASTLE.y+30,"#ff8b5e",14); addFloater(`-${e.dmg}`,CASTLE.x,CASTLE.y,"#ff7b6b");
  Audio2.hit();
  if(S.castleHp<=0){ S.castleHp=0; lose(); }
  syncHud();
}
function damageEnemy(e,dmg,sourceX,source){
  const armor = source==="king" ? 0 : (e.armor||0);
  const real=dmg*(1-armor);
  e.hp-=real; e.hit=Math.max(e.hit||0,180); e.stun=Math.max(e.stun||0,90);
  if(sourceX!=null){ const dir=e.x<sourceX?-1:1; e.kx+=dir*1.6; }
  if(e.hp<=0 && !e.dead){ killEnemy(e); }
}
function killEnemy(e){
  e.dead=true; S.killsThisWave++;
  const dustColor=e.type==="siege"?"#c58a54":"#ffd9a0";
  burst(e.x,e.y,dustColor,e.boss?34:(e.type==="siege"?22:12));
  if(e.type==="siege"){
    spriteFx("siege_destroy",e.x,e.y+8,e.r*5.6,620);
    S.shake=Math.max(S.shake,180);
    S.flash=Math.max(S.flash,0.22);
  }
  if(e.explode){ // bomber explosion hurts facilities + visual
    spriteFx("explosion",e.x,e.y,e.r*4,420); S.shake=Math.max(S.shake,150); Audio2.boom();
    for(const f of S.facilities){ if(dist(e.x,e.y,f.x,f.y)<e.explode) damageFacility(f,40); }
  } else { Audio2.hit(); }
  // coin drop
  const n=e.boss?Math.ceil(e.coin/8):1;
  for(let i=0;i<n;i++) S.coinsOnGround.push({x:e.x+rand(-10,10),y:e.y+rand(-10,10),v:Math.ceil(e.coin/n),vx:rand(-30,30),vy:rand(-60,-20),life:BAL.coinLife,t:0,grav:0.3});
  if(e.boss){ ring(e.x,e.y,"#ffe58f",120,800); S.flash=Math.max(S.flash,0.5); }
}

/* facilities: fire / spawn soldiers */
function spawnBarracksUnit(f){
  const homeUnits=S.soldiers.filter(s=>s.home===f.id && !s.dead);
  const archerCount=homeUnits.filter(s=>s.kind==="archer").length;
  const makeArcher=f.level>=2 && archerCount<1;
  if(makeArcher){
    const hp=Math.round(f.sHp*0.72);
    const dmg=Math.max(7,Math.round(f.sDmg*0.88));
    return {id:S.nextId++,home:f.id,x:f.x+rand(-8,8),y:f.y+10,hp,max:hp,dmg,
      facing:1,anim:0,atk:0,dead:false,kx:0,hit:0,thrust:0,moving:false,kind:"archer",range:112+(f.level-1)*8,cd:760-(f.level-1)*40,speed:58};
  }
  return {id:S.nextId++,home:f.id,x:f.x+rand(-8,8),y:f.y+12,hp:f.sHp,max:f.sHp,dmg:f.sDmg,
    facing:1,anim:0,atk:0,dead:false,kx:0,hit:0,thrust:0,moving:false,kind:"spear",speed:64};
}

function updateFacilities(dt){
  const k=S.king;
  for(const f of S.facilities){
    if(f.levelFlash>0) f.levelFlash-=dt;
    if(f.sweep>0) f.sweep=Math.max(0,f.sweep-dt*0.0016);
    if(f.maxGlow>0) f.maxGlow-=dt;
    if(f.attackT>0) f.attackT=Math.max(0,f.attackT-dt);
    if(f.spawnPulse>0) f.spawnPulse=Math.max(0,f.spawnPulse-dt);
    f.scale+=(1-f.scale)*0.16;
    if(f.type==="archer"||f.type==="cannon"){
      const rally = dist(k.x,k.y,f.x,f.y)<BAL.kingRally ? (1-BAL.kingRallyBonus) : 1;
      f.fire-=dt;
      if(f.fire<=0){
        const tgt=acquire(f);
        if(tgt){
          f.fire=f.cd*rally;
          S.projectiles.push({x:f.x,y:f.y-18,tx:tgt.x,ty:tgt.y,target:tgt,spd:f.type==="cannon"?300:440,
            dmg:f.dmg,splash:f.splash||0,c:DEF[f.type].proj,cannon:f.type==="cannon",r:f.type==="cannon"?5:3,
            source:f.type==="cannon"?"cannonTower":"archerTower",originX:f.x,originY:f.y-18});
          if(f.type==="cannon"){ Audio2.cannon(); smokeBurst(f.x,f.y-20,8,26,460,"rgba(205,210,220,0.34)"); ring(f.x,f.y-18,"rgba(255,214,148,0.38)",26,200); }
          else { Audio2.shoot(); }
          f.attackT = f.type==="cannon" ? 380 : 300;
          f.recoil=1;
        }
      }
      if(f.recoil>0) f.recoil=Math.max(0,f.recoil-dt*0.005);
    }
    if(f.type==="barracks"){
      f.spawnT-=dt;
      const alive=S.soldiers.filter(s=>s.home===f.id && !s.dead).length;
      if(f.spawnT<=0 && alive<f.cap){
        f.spawnT=f.spawn;
        f.spawnPulse=360;
        spriteFx("build",f.x,f.y-4,44,260);
        ring(f.x,f.y-2,"#d8efff",34,260);
        burst(f.x,f.y-2,"#e6f4ff",6);
        S.soldiers.push(spawnBarracksUnit(f));
      }
    }
  }
}
function acquire(f){
  let best=null,bestSeg=-1;
  for(const e of S.enemies){ if(e.dead) continue; const d=dist(f.x,f.y,e.x,e.y); if(d<=f.range){
    const prog=e.seg+ (1-d*0.0001);
    if(prog>bestSeg){ bestSeg=prog; best=e; }
  }}
  return best;
}

function updateSoldiers(dt){
  for(const s of S.soldiers){
    if(s.dead) continue;
    const home=S.facilities.find(f=>f.id===s.home);
    s.kx*=0.85; s.x+=s.kx;
    s.hit=Math.max(0,(s.hit||0)-dt);
    s.thrust=Math.max(0,(s.thrust||0)-dt);
    s.atk=Math.max(0,s.atk-dt);
    s.moving=false;
    const isArcher=s.kind==="archer";
    const seekRange=isArcher ? (s.range||120)+24 : 120;
    let tgt=null,bd=seekRange;
    for(const e of S.enemies){ if(e.dead) continue; const d=dist(s.x,s.y,e.x,e.y); if(d<bd){bd=d;tgt=e;} }
    if(tgt){
      const dx=tgt.x-s.x,dy=tgt.y-s.y,d=Math.hypot(dx,dy)||1;
      if(Math.abs(dx)>1)s.facing=dx<0?-1:1;
      if(isArcher){
        const range=s.range||112, retreat=54, moveSpd=s.speed||58;
        if(d>range){
          s.x+=dx/d*moveSpd*dt/1000; s.y+=dy/d*moveSpd*dt/1000; s.anim+=dt*0.011; s.moving=true;
        } else if(d<retreat){
          s.x-=dx/d*(moveSpd+12)*dt/1000; s.y-=dy/d*(moveSpd+12)*dt/1000; s.anim+=dt*0.011; s.moving=true;
        } else {
          s.anim+=dt*0.015;
          if(s.atk<=0){
            s.atk=s.cd||760;
            const sx=s.x + (s.facing>0?8:-8), sy=s.y-16;
            S.projectiles.push({x:sx,y:sy,tx:tgt.x,ty:tgt.y,target:tgt,spd:520,dmg:s.dmg,c:"#ffe6a6",ally:true,source:"allyArcher",originX:sx,originY:sy});
            burst(sx,sy,"#fff2b5",3);
            ring(sx,sy,"rgba(255,241,188,0.55)",14,160);
            Audio2.shoot();
            if(d<34){ s.hp-=tgt.dmg*0.18; s.hit=Math.max(s.hit||0,90); s.kx+=(tgt.x<s.x?1:-1)*0.7; }
          }
        }
      } else {
        if(d>22){
          s.x+=dx/d*(s.speed||64)*dt/1000; s.y+=dy/d*(s.speed||64)*dt/1000; s.anim+=dt*0.012; s.moving=true;
        } else {
          s.anim+=dt*0.018;
          if(s.atk<=0){
            s.atk=520; s.thrust=180;
            damageEnemy(tgt,s.dmg,s.x);
            tgt.kx+= (s.x<tgt.x?-1:1)*0.6;
            spriteFx("hit",(s.x+tgt.x)/2,(s.y+tgt.y)/2,22,180);
            ring((s.x+tgt.x)/2,(s.y+tgt.y)/2,"#fff2b8",24,180);
            burst((s.x+tgt.x)/2,(s.y+tgt.y)/2,"#ffd9a0",4);
            s.hp-=tgt.dmg*0.5;
            s.hit=Math.max(s.hit||0,120);
            s.kx+=(tgt.x<s.x?1:-1)*1.2;
          }
        }
      }
    } else if(home){
      const targetX=home.x + (isArcher?16:0), targetY=home.y + (isArcher?4:12);
      const dx=targetX-s.x,dy=targetY-s.y,d=Math.hypot(dx,dy);
      if(d>10){
        const rt=isArcher?52:48;
        s.x+=dx/d*rt*dt/1000; s.y+=dy/d*rt*dt/1000; s.anim+=dt*0.01; s.moving=true;
        if(Math.abs(dx)>1)s.facing=dx<0?-1:1;
      }
    }
    if(s.hp<=0){ s.dead=true; burst(s.x,s.y,isArcher?"#d2e8ff":"#cdb089",10); }
  }
  S.soldiers=S.soldiers.filter(s=>!s.dead || s===null);
  S.soldiers=S.soldiers.filter(s=>!s.dead);
}

function updateProjectiles(dt){
  for(const p of S.projectiles){
    let tx=p.tx,ty=p.ty;
    if(p.target && !p.target.dead){ tx=p.target.x; ty=p.target.y; p.tx=tx; p.ty=ty; }
    const dx=tx-p.x,dy=ty-p.y,d=Math.hypot(dx,dy)||1, step=p.spd*dt/1000;
    if(d<=step+2){
      if(p.splash>0){
        cannonImpactFx(tx,ty,p.splash);
        for(const e of S.enemies){ if(!e.dead && dist(tx,ty,e.x,e.y)<p.splash) damageEnemy(e,p.dmg,p.x); }
        S.shake=Math.max(S.shake,110);
      } else {
        if(p.target && !p.target.dead) damageEnemy(p.target,p.dmg,p.x);
        const power=p.source==="archerTower"?1.25:(p.source==="kingArrow"?1.08:0.95);
        arrowImpactFx(tx,ty,power,p.c||"#fff1bc");
      }
      p.dead=true;
    } else {
      p.px=p.x; p.py=p.y;
      p.x+=dx/d*step; p.y+=dy/d*step; p.ang=Math.atan2(dy,dx);
    }
  }
  S.projectiles=S.projectiles.filter(p=>!p.dead);
}

function damageFacility(f,dmg){
  f.hp-=dmg; f.hit=120;
  if(f.hp<=0){ // destroyed
    const slot=S.slots.find(s=>s.facilityId===f.id); if(slot) slot.facilityId=null;
    burst(f.x,f.y,"#a0744a",16); addFloater("施設 破壊",f.x,f.y-26,"#ff9a6b");
    if(f.type==="barracks"){ S.soldiers.forEach(s=>{ if(s.home===f.id) s.dead=true; }); }
    f.dead=true;
  }
}
// purge destroyed facilities each frame
function purgeFacilities(){ if(S.facilities.some(f=>f.dead)) S.facilities=S.facilities.filter(f=>!f.dead); }

function updateCoins(dt){
  const k=S.king;
  for(const c of S.coinsOnGround){
    c.t+=dt;
    if(c.vy!=null){
      if(c.t<520){ c.vx*=0.9; c.vy+=c.grav; c.x+=c.vx*dt/1000*6; c.y+=c.vy*dt/1000*6; }
      else { c.vx=null; c.vy=null; }
      c.x=clamp(c.x,8,W-8); c.y=clamp(c.y,100,H-8);
    }
    const d=dist(k.x,k.y,c.x,c.y);
    if(d<BAL.coinPickupRange){
      const dx=k.x-c.x,dy=k.y-c.y,dd=Math.hypot(dx,dy)||1;
      c.x+=dx/dd*240*dt/1000; c.y+=dy/dd*240*dt/1000;
      if(dd<16){ S.coins+=c.v; c.dead=true; Audio2.coin(); addFloater(`+${c.v}`,c.x,c.y-8,"#ffd35b"); spriteFx("coin_pickup",c.x,c.y,22,200); }
    }
  }
  S.coinsOnGround=S.coinsOnGround.filter(c=>!c.dead && c.t<c.life);
  purgeFacilities();
}

function updateParticles(dt){
  for(const p of S.particles){ p.t+=dt; p.x+=p.vx*dt/1000; p.y+=p.vy*dt/1000; if(p.grav) p.vy+=p.grav*dt; }
  S.particles=S.particles.filter(p=>p.t<p.life);
  for(const fx of (S.fx||[])){ fx.t+=dt; }
  if(S.fx) S.fx=S.fx.filter(f=>f.t<f.life);
}

/* fx helpers */
function burst(x,y,c,n){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,sp=rand(20,160); S.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:rand(300,700),t:0,r:rand(1.5,3.5),c,grav:0.18}); } }
function ring(x,y,c,rad,life){ S.rings.push({x,y,c,rad,life,t:0}); }
function addFloater(text,x,y,c){ S.floaters.push({text,x,y,c,t:0,life:1000}); }
function spriteFx(name,x,y,size,life){ if(!S.fx)S.fx=[]; S.fx.push({name,x,y,size,life,t:0}); }
function smokeBurst(x,y,n,spread,life,c="rgba(190,195,205,0.42)"){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28,sp=rand(10,spread||40);
    S.particles.push({x:x+rand(-4,4),y:y+rand(-4,4),vx:Math.cos(a)*sp*0.45,vy:Math.sin(a)*sp*0.35-rand(8,28),life:rand(life*0.7,life*1.15),t:0,r:rand(3,8),c,grav:-0.01});
  }
}
function arrowImpactFx(x,y,power,c){
  spriteFx("hit",x,y,24+power*5,220);
  ring(x,y,c||"#fff1bc",24+power*6,180);
  burst(x,y,"#ffd9a0",4+Math.round(power*2));
  for(let i=0;i<4+Math.round(power*2);i++){
    const a=Math.random()*6.28,sp=rand(20,110)*(0.7+power*0.18);
    S.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-rand(5,25),life:rand(180,320),t:0,r:rand(1.4,2.8),c:i%2?"rgba(255,245,210,0.95)":"rgba(255,206,136,0.85)",grav:0.12});
  }
}
function cannonImpactFx(x,y,rad){
  spriteFx("explosion",x,y,rad*1.45,360);
  ring(x,y,"#ffd197",rad*0.95,320);
  ring(x,y,"rgba(90,70,55,0.45)",rad*1.35,480);
  burst(x,y,"#ffcb8a",12);
  burst(x,y,"rgba(120,88,52,0.85)",7);
  smokeBurst(x,y,14,rad*0.75,520,"rgba(120,120,120,0.32)");
}

/* end states */
function win(){ const next=clearStageProgress(S.stageId); S.nextStageId=next; if(next) selectedStageId=next; S.status="win"; Audio2.win(); saveBest(); showEnd(true); }
function lose(){ S.status="lose"; Audio2.lose(); saveBest(); showEnd(false); }
function saveBest(){ try{ const prev=getSaveData(); const best=Math.max(prev.bestWave||0, S.waveIdx+(S.status==="win"?1:0)); saveGameData({bestWave:best,muted:Audio2.muted}); }catch(e){} }
function clearStageProgress(stageId){
  const progress=normalizeProgress(getSaveData());
  const cleared=new Set(progress.clearedStages);
  const unlocked=new Set(progress.unlockedStages);
  cleared.add(stageId); unlocked.add(stageId);
  const next=getNextStageId(stageId);
  if(next) unlocked.add(next);
  saveGameData({clearedStages:[...cleared],unlockedStages:[...unlocked],selectedStageId:next||stageId});
  return next;
}

function render(){
  ctx.save();
  if(S && S.shake>0){ const m=S.shake/200*5; ctx.translate(rand(-m,m),rand(-m,m)); }
  drawBackground();
  if(S){
    drawRoutesGuide();
    drawSlots();
    // depth-sorted actors
    const actors=[];
    for(const f of S.facilities) actors.push({y:f.y,kind:"fac",o:f});
    for(const s of S.soldiers) actors.push({y:s.y,kind:"sol",o:s});
    for(const e of S.enemies) actors.push({y:e.y,kind:"enm",o:e});
    actors.push({y:S.king.y,kind:"king",o:S.king});
    actors.sort((a,b)=>a.y-b.y);
    drawCastle();
    for(const a of actors){
      if(a.kind==="fac") drawFacility(a.o);
      else if(a.kind==="enm") drawEnemy(a.o);
      else if(a.kind==="sol") drawSoldier(a.o);
      else if(a.kind==="king") drawKing(a.o);
    }
    drawProjectiles();
    drawCoins();
    drawParticles();
    drawRings();
    drawSpriteFx();
    drawFloaters();
    drawMist();
    drawMenu();
    drawBanner();
  }
  ctx.restore();
  if(S && S.flash>0){ ctx.fillStyle=`rgba(255,255,255,${S.flash})`; ctx.fillRect(0,0,W,H); }
}

function drawBackground(){
  // grass gradient
  const st=currentStage();
  const g=ctx.createLinearGradient(0,0,0,H);
  if(st.id==="ridge") { g.addColorStop(0,"#9bb36a"); g.addColorStop(0.5,"#728f56"); g.addColorStop(1,"#536d45"); }
  else if(st.id==="rivergate") { g.addColorStop(0,"#73a977"); g.addColorStop(0.5,"#4d9564"); g.addColorStop(1,"#3f7b5b"); }
  else if(st.id==="forest") { g.addColorStop(0,"#5f9a58"); g.addColorStop(0.5,"#3f7e42"); g.addColorStop(1,"#2f6338"); }
  else if(st.id==="bastion") { g.addColorStop(0,"#8e986d"); g.addColorStop(0.5,"#6f7b5a"); g.addColorStop(1,"#515f4c"); }
  else if(st.id==="crossroads") { g.addColorStop(0,"#73b969"); g.addColorStop(0.5,"#529b55"); g.addColorStop(1,"#3f8046"); }
  else { g.addColorStop(0,"#6db05f"); g.addColorStop(0.5,"#4f9a4e"); g.addColorStop(1,"#3c8042"); }
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // soft depth blobs
  ctx.save();
  const blobs=[[120,250,180,"rgba(40,110,70,.25)"],[360,520,200,"rgba(30,90,60,.22)"],[240,700,220,"rgba(60,130,80,.18)"]];
  for(const [x,y,r,c] of blobs){ ctx.fillStyle=c; ctx.beginPath(); ctx.ellipse(x,y,r,r*0.7,0,0,6.28); ctx.fill(); }
  ctx.restore();
  drawStageUnderlay(st);
  // roads
  for(const pts of Object.values(ROUTE)) drawRoad(pts);
  drawStageDetails(st);
  // merge plaza
  ctx.fillStyle="#c4a06a"; ctx.beginPath(); ctx.ellipse(MERGE.x,MERGE.y,40,30,0,0,6.28); ctx.fill();
  ctx.fillStyle="#d8b87e"; ctx.beginPath(); ctx.ellipse(MERGE.x,MERGE.y,30,22,0,0,6.28); ctx.fill();
  // props (trees/rocks) with shadow + sway
  if(S){ for(const p of S.props){
    const sway=p.swA?Math.sin(S.time*0.0012+p.sway)*p.swA:0;
    sprite("shadow",p.x,p.y+2,p.h*0.34,{alpha:0.28,ay:0.5,sx:1.2});
    sprite(p.img,p.x+sway,p.y,p.h,{});
  }}
}

function drawRoad(pts){
  const layers=[["#7c5a32",30],["#caa46a",22],["#dcbf86",14]];
  for(const [c,wd] of layers){
    ctx.strokeStyle=c; ctx.lineWidth=wd; ctx.lineCap="round"; ctx.lineJoin="round";
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y); ctx.stroke();
  }
  // dotted center
  ctx.strokeStyle="rgba(120,90,50,.4)"; ctx.lineWidth=2; ctx.setLineDash([5,9]);
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y); ctx.stroke();
  ctx.setLineDash([]);
}

function drawSlots(){
  for(const s of S.slots){
    if(s.facilityId) continue; // built slots drawn as facility
    const pulse=0.5+Math.sin(s.pulse*0.004)*0.5;
    const col = s.kind==="road"?"#ffcf66": s.kind==="ground"?"#8cff9d":"#ffd84d";
    const core = s.kind==="road" ? "rgba(255,207,102,.34)" : s.kind==="ground" ? "rgba(140,255,157,.25)" : "rgba(255,216,77,.28)";
    ctx.save();
    ctx.globalCompositeOperation="lighter";
    ctx.globalAlpha=0.20+pulse*0.16;
    const g=ctx.createRadialGradient(s.x,s.y,3,s.x,s.y,s.kind==="road"?34:31);
    g.addColorStop(0,core);
    g.addColorStop(0.55,"rgba(255,255,210,.10)");
    g.addColorStop(1,"rgba(255,255,210,0)");
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.kind==="road"?34:31,0,6.28); ctx.fill();
    ctx.globalCompositeOperation="source-over";

    ctx.lineWidth=s.inRange?4:3;
    ctx.strokeStyle=s.inRange?"#fff7b7":col;
    ctx.setLineDash(s.inRange?[]:[7,6]);
    ctx.globalAlpha=s.inRange?0.96:0.56+pulse*0.22;
    if(s.kind==="road"){
      roundRect(s.x-21,s.y-15,42,30,11); ctx.stroke();
      ctx.globalAlpha=0.16+pulse*0.10;
      ctx.fillStyle=col; roundRect(s.x-19,s.y-13,38,26,10); ctx.fill();
    } else {
      ctx.beginPath(); ctx.ellipse(s.x,s.y,24,18,0,0,6.28); ctx.stroke();
      ctx.globalAlpha=0.12+pulse*0.10;
      ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(s.x,s.y,22,16,0,0,6.28); ctx.fill();
    }
    ctx.setLineDash([]);
    if(s.inRange){
      ctx.globalAlpha=0.28; ctx.strokeStyle="#ffffff"; ctx.lineWidth=7;
      if(s.kind==="road"){ roundRect(s.x-24,s.y-18,48,36,13); ctx.stroke(); }
      else { ctx.beginPath(); ctx.ellipse(s.x,s.y,29,22,0,0,6.28); ctx.stroke(); }
    }
    ctx.restore();
  }
}

function drawFacility(f){
  const bx=f.x, by=f.y;
  const baseH = BUILD_DRAW_HEIGHT[f.type] || 56;
  const renderScale = (BUILD_RENDER_SCALE[f.type] || 1) * (f.scale || 1);
  const renderH = baseH * renderScale;
  const shadowH = 26 * (BUILD_RENDER_SCALE[f.type] || 1) * 0.96;
  sprite("shadow",bx,by+8,shadowH,{alpha:0.28,ay:0.5,sx:1.2});
  // range ring when king buffs it
  if((f.type==="archer"||f.type==="cannon") && dist(S.king.x,S.king.y,f.x,f.y)<BAL.kingRally){
    ctx.save(); ctx.globalAlpha=0.12; ctx.strokeStyle="#ffe79a"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(f.x,f.y,f.range,0,6.28); ctx.stroke(); ctx.restore();
  }
  let xoff=0, yoff=0, sxMul=1, syMul=1;
  if(f.recoil>0){
    yoff=f.recoil*(f.type==="cannon"?4.8:3.4);
    if(f.type==="cannon"){ xoff-=f.recoil*2.2; sxMul=1+f.recoil*0.04; syMul=1-f.recoil*0.05; }
  }
  const key=`b_${f.type}_${f.level}`;
  const attackDur = f.type==="cannon" ? 380 : 300;
  const attackKey = f.type==="archer" ? "b_attack_archer" : (f.type==="cannon" ? "b_attack_cannon" : null);
  const attackFrame = attackKey ? Math.min(3, Math.floor((1-clamp((f.attackT||0)/attackDur,0,1))*4)) : 0;
  ctx.save();
  const drewAttack = attackKey && f.attackT>0 && ready(attackKey) ? spriteFrame(attackKey,bx+xoff,by+yoff,renderH,4,attackFrame,{sx:sxMul,sy:syMul}) : false;
  if(!drewAttack) sprite(key,bx+xoff,by+yoff,renderH,{sx:sxMul,sy:syMul});
  if(f.type==="cannon" && (f.attackT||0)>0){
    const p=clamp((f.attackT||0)/380,0,1);
    for(let i=0;i<3;i++){
      ctx.save();
      ctx.globalAlpha=(0.18+0.08*i)*p;
      ctx.fillStyle=i===0?"rgba(255,226,176,0.95)":"rgba(190,195,205,0.42)";
      ctx.beginPath(); ctx.arc(bx+8+i*4,by-renderH*0.32-i*3,5+i*3+p*2,0,6.28); ctx.fill();
      ctx.restore();
    }
  }
  if(f.sweep>0){
    ctx.save();
    ctx.globalCompositeOperation="lighter";
    ctx.globalAlpha=f.sweep*0.6;
    const yy=by - renderH + (renderH*1.4)*(1-f.sweep);
    const grad=ctx.createLinearGradient(0,yy-10,0,yy+10);
    grad.addColorStop(0,"rgba(255,255,255,0)"); grad.addColorStop(0.5,LVCOLOR[f.level]); grad.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=grad; ctx.fillRect(bx-renderH*0.7,yy-10,renderH*1.4,20);
    ctx.restore();
  }
  if(f.maxGlow>0){ ctx.save(); ctx.globalAlpha=(f.maxGlow/1600)*0.4*(0.6+Math.sin(S.time*0.02)*0.4); ctx.fillStyle="#ffe58f";
    ctx.beginPath(); ctx.arc(bx,by-renderH*0.4,renderH*0.7,0,6.28); ctx.fill(); ctx.restore(); }
  if(f.type==="barracks" && (f.spawnPulse||0)>0){
    const p=clamp((f.spawnPulse||0)/360,0,1);
    ctx.save();
    ctx.globalCompositeOperation="screen";
    ctx.globalAlpha=0.14+0.2*p;
    const grad=ctx.createRadialGradient(bx,by-renderH*0.25,4,bx,by-renderH*0.25,renderH*0.75);
    grad.addColorStop(0,"rgba(255,255,255,0.9)");
    grad.addColorStop(0.35,"rgba(210,240,255,0.45)");
    grad.addColorStop(1,"rgba(210,240,255,0)");
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(bx,by-renderH*0.18,renderH*0.58,0,6.28); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.globalAlpha=0.24+0.22*p; ctx.strokeStyle="#d8efff"; ctx.lineWidth=2.2;
    ctx.beginPath(); ctx.ellipse(bx,by+7,24+7*(1-p),11+4*(1-p),0,0,6.28); ctx.stroke(); ctx.restore();
  }
  ctx.restore();
  if(f.hp<f.maxHp-0.5){
    const w=28, hx=bx-w/2, hy=by-renderH-6;
    ctx.fillStyle="rgba(0,0,0,.4)"; ctx.fillRect(hx,hy,w,4);
    ctx.fillStyle=f.hp/f.maxHp>0.4?"#7fd17f":"#e06b5a"; ctx.fillRect(hx,hy,w*clamp(f.hp/f.maxHp,0,1),4);
  }
  for(let i=0;i<f.level;i++){ ctx.fillStyle=LVCOLOR[f.level]; ctx.beginPath(); ctx.arc(bx-6+i*4,by+10,1.6,0,6.28); ctx.fill(); }
}

function enemyDrawHeight(type){ return DRAW_SIZE.enemy[type] || 44; }
function drawEnemySprite(e,bob,h,alpha){
  const walkFrame=Math.floor(e.anim||0)%4;
  const opt={flip:e.facing<0};
  if(alpha!=null) opt.alpha=alpha;
  const vx=clamp(e.kx||0,-3.5,3.5);
  const vy=clamp(e.ky||0,-3.5,3.5);
  const dx=(e.hit||0)>0 ? vx : 0;
  const dy=(e.hit||0)>0 ? vy : 0;
  if(e.attacking && ready(`e_attack_${e.type}`)){
    return spriteFrameTrim(`e_attack_${e.type}`,e.x+dx,e.y+dy+bob,h,4,e.atkFrame||0,opt);
  }
  if(spriteFrameTrim(`e_walk_${e.type}`,e.x+dx,e.y+dy+bob,h,4,walkFrame,opt)) return true;
  return spriteTrim(`e_${e.type}`,e.x+dx,e.y+dy+bob,h,opt);
}
function drawEnemy(e){
  const bob=Math.sin(e.bob)*2;
  const h=enemyDrawHeight(e.type);
  sprite("shadow",e.x,e.y+Math.max(7,h*0.22),Math.max(15,h*0.38),{alpha:0.26,ay:0.5,sx:1.12});
  // hp bar
  if(e.hp<e.max-0.5 || e.boss){
    const w=e.boss?48:Math.max(22,h*0.58), hx=e.x-w/2, hy=e.y-h-(e.boss?10:6);
    ctx.fillStyle="rgba(0,0,0,.45)"; ctx.fillRect(hx,hy,w,e.boss?5:3);
    ctx.fillStyle=e.boss?"#ff7b6b":"#ffd06b"; ctx.fillRect(hx,hy,w*clamp(e.hp/e.max,0,1),e.boss?5:3);
  }
  const flash=e.hit>0;
  if(!drawEnemySprite(e,bob,h)){
    ctx.fillStyle=flash?"#fff":"#c0392b"; ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,6.28); ctx.fill();
  }
  if(flash){
    const p=clamp(e.hit/180,0,1);
    ctx.save();
    ctx.globalCompositeOperation="lighter";
    ctx.globalAlpha=0.32+0.4*p;
    ctx.shadowColor="rgba(255,255,255,0.95)";
    ctx.shadowBlur=10+20*p;
    drawEnemySprite(e,bob,h);
    ctx.restore();
    ctx.save();
    ctx.globalCompositeOperation="screen";
    ctx.globalAlpha=0.2+0.28*p;
    drawEnemySprite(e,bob,h);
    ctx.restore();
  }
  if(e.aura){ ctx.save(); ctx.globalAlpha=0.12; ctx.strokeStyle="#b06bff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(e.x,e.y,e.aura,0,6.28); ctx.stroke(); ctx.restore(); }
}

function drawSoldier(s){
  const h=DRAW_SIZE.ally;
  sprite("shadow",s.x,s.y+8,16,{alpha:0.25,ay:0.5,sx:1.1});
  const isArcher=s.kind==="archer";
  const lunge=!isArcher && s.atk>300?(s.atk-300)/220*4:0;
  const attackSpan=isArcher?(s.cd||760):520;
  const attackStep=isArcher?Math.max(1,attackSpan/4):130;
  const attackFrame = 1+Math.floor((attackSpan-Math.max(0,s.atk))/attackStep)%4;
  const walkFrame = 1+Math.floor((s.anim||0)%4);
  const idleKey=isArcher?"ally_archer":"ally1";
  const walkKey=isArcher?`ally_archer_w${walkFrame}`:`ally_w${walkFrame}`;
  const atkKey=isArcher?`ally_archer_a${attackFrame}`:`ally_a${attackFrame}`;
  const key = s.atk>0 ? atkKey : (s.moving && ready(walkKey) ? walkKey : idleKey);
  const drawX=s.x + (s.facing>0?lunge:-lunge);
  if(!isArcher && (s.thrust||0)>0){
    const p=clamp((s.thrust||0)/180,0,1);
    ctx.save();
    ctx.globalAlpha=0.10+0.24*p;
    ctx.strokeStyle="#fff0b8";
    ctx.lineWidth=2.2+1.2*p;
    ctx.lineCap="round";
    ctx.beginPath();
    const dir=s.facing<0?-1:1;
    ctx.moveTo(drawX+dir*8,s.y-10);
    ctx.lineTo(drawX+dir*(26+20*p),s.y-16);
    ctx.stroke();
    ctx.restore();
  }
  const drew = s.atk>0 && ready(atkKey)
    ? spriteTrim(atkKey,drawX,s.y,h,{flip:s.facing<0})
    : spriteTrim(key,drawX,s.y,h,{flip:s.facing<0});
  if(!drew){
    ctx.fillStyle=isArcher?"#5377a8":"#5b7fb0"; ctx.beginPath(); ctx.arc(s.x,s.y,8,0,6.28); ctx.fill();
  }
  if((s.hit||0)>0){
    const p=clamp((s.hit||0)/120,0,1);
    ctx.save();
    ctx.globalAlpha=0.18+0.22*p;
    ctx.strokeStyle=isArcher?"#d7ecff":"#fff0b8";
    ctx.lineWidth=1.5+1.5*p;
    ctx.beginPath(); ctx.ellipse(s.x,s.y-h*0.42,12+4*p,15+5*p,0,0,6.28); ctx.stroke();
    ctx.restore();
  }
  if(s.hp<s.max-0.5){ const w=16,hx=s.x-8,hy=s.y-h-4; ctx.fillStyle="rgba(0,0,0,.4)"; ctx.fillRect(hx,hy,w,3); ctx.fillStyle=isArcher?"#93d0ff":"#7fd17f"; ctx.fillRect(hx,hy,w*clamp(s.hp/s.max,0,1),3); }
}

function drawKingAttackStable(k,h,attackProgress){
  const pulse = Math.sin(attackProgress*Math.PI);
  const frame = Math.min(3, Math.floor(attackProgress*4));
  const drawX = k.x - (k.facing||1)*pulse*1.2;
  const ok = ready("king_attack_bow")
    ? spriteFrame("king_attack_bow",drawX,k.y,h,4,frame,{flip:k.facing<0,sx:1+0.015*pulse,sy:1-0.012*pulse})
    : sprite(ready("king_idle3") ? "king_idle3" : (ready("king_idle2") ? "king_idle2" : "king_idle1"),drawX,k.y,h,{flip:k.facing<0,sx:1+0.02*pulse,sy:1-0.015*pulse});
  if(!ok){ ctx.fillStyle="#d9b54a"; ctx.beginPath(); ctx.arc(k.x,k.y-16,12,0,6.28); ctx.fill(); }
  const dir=k.facing<0?-1:1;
  const aimY=k.y-31;
  if(attackProgress>0.62 && attackProgress<0.92){
    ctx.save();
    ctx.globalCompositeOperation="screen";
    ctx.globalAlpha=0.14+0.25*pulse;
    ctx.fillStyle="#fff5c7";
    ctx.beginPath(); ctx.ellipse(k.x+dir*18,aimY,10+5*pulse,7+3*pulse,0,0,6.28); ctx.fill();
    ctx.restore();
  }
}

function drawKing(k){
  sprite("shadow",k.x,k.y+6,24,{alpha:0.3,ay:0.5,sx:1.2});
  let key,h=DRAW_SIZE.king,sx=1,sy=1;
  const building=k.build>0;
  const hurtT=clamp((k.hurt||0)/BAL.kingHurtAnim,0,1);
  const hurtProgress=1-hurtT;
  const attackT=clamp((k.attackFlash||0)/BAL.kingAttackAnim,0,1);
  const attackProgress=1-attackT;
  if(building){ key=ready("king_idle3")?"king_idle3":(ready("king_idle2")?"king_idle2":"king_idle1"); sy=0.94; sx=1.06; }
  else if(hurtT>0 && ready("king_hit")){
    const frame=Math.min(3,Math.floor(hurtProgress*4));
    spriteFrame("king_hit",k.x,k.y,h,4,frame,{flip:k.facing<0,sx:1.03,sy:0.99});
    if((k.hurtFlash||0)>0){
      ctx.save();
      ctx.globalCompositeOperation='screen';
      ctx.globalAlpha=0.18 + 0.30*(k.hurtFlash/BAL.kingHurtAnim);
      ctx.fillStyle='#fff7c8';
      ctx.beginPath(); ctx.ellipse(k.x,k.y-18,22,26,0,0,6.28); ctx.fill();
      ctx.restore();
    }
    if(k.moving){ ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle="#fff"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(k.tx,k.ty,10+Math.sin(S.time*0.01)*3,0,6.28); ctx.stroke(); ctx.restore(); }
    return;
  }
  else if(attackT>0){
    drawKingAttackStable(k,h,attackProgress);
    if(k.moving){ ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle="#fff"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(k.tx,k.ty,10+Math.sin(S.time*0.01)*3,0,6.28); ctx.stroke(); ctx.restore(); }
    return;
  }
  else if(k.moving){ const fr=1+Math.floor(k.anim*4)%4; key=`king_run${fr}`; sy=k.squash; sx=2-k.squash; }
  else {
    const idleFrame = 1 + (Math.floor(S.time/220) % 4);
    key = `king_idle${idleFrame}`;
    sy = 1 + Math.sin(S.time*0.004)*0.02;
  }
  if(!ready(key)) key="king_idle1";
  if(!sprite(key,k.x,k.y,h,{flip:k.facing<0,sx:sx,sy:sy})){
    ctx.fillStyle="#d9b54a"; ctx.beginPath(); ctx.arc(k.x,k.y-16,12,0,6.28); ctx.fill();
  }
  // build pose ring
  if(building){ ctx.save(); ctx.globalAlpha=0.5*(k.build/260); ctx.strokeStyle="#ffe79a"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(k.x,k.y-12,22,0,6.28); ctx.stroke(); ctx.restore(); }
  // move target marker
  if(k.moving){ ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle="#fff"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(k.tx,k.ty,10+Math.sin(S.time*0.01)*3,0,6.28); ctx.stroke(); ctx.restore(); }
}

function drawProjectiles(){
  for(const p of S.projectiles){
    if(p.cannon){
      if(p.px!=null){
        const dx=p.x-p.px, dy=p.y-p.py;
        for(let i=1;i<=3;i++){

        }
      }
      ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill();
      ctx.fillStyle="rgba(255,226,160,.22)"; ctx.beginPath(); ctx.arc(p.x+1,p.y-1,p.r*1.45,0,6.28); ctx.fill();
      ctx.fillStyle="rgba(0,0,0,.28)"; ctx.beginPath(); ctx.arc(p.x-1,p.y+1,p.r*0.55,0,6.28); ctx.fill();
    } else {

      ctx.beginPath(); ctx.moveTo(-18,0); ctx.lineTo(4,0); ctx.stroke();

      ctx.strokeStyle=p.c || (isKing?"#ffe08a":"#f7f1cf");
      ctx.lineWidth=2.2; ctx.lineCap="round";
      ctx.beginPath(); ctx.moveTo(-11,0); ctx.lineTo(4,0); ctx.stroke();
      ctx.fillStyle=isKing?"#fff4c0":"#f3ead2";
      ctx.beginPath(); ctx.moveTo(5,0); ctx.lineTo(0,-3); ctx.lineTo(0,3); ctx.closePath(); ctx.fill();
      ctx.strokeStyle="rgba(120,80,40,.85)"; ctx.lineWidth=1.3;
      ctx.beginPath(); ctx.moveTo(-11,0); ctx.lineTo(-2,0); ctx.stroke();
      if(isTower){ ctx.globalAlpha=0.75; ctx.fillStyle="rgba(255,250,210,.9)"; ctx.beginPath(); ctx.arc(-12,0,1.3,0,6.28); ctx.fill(); }
      ctx.restore();
    }
  }
}
function drawCoins(){

function drawRings(){
