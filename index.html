/* action menu (on-canvas), buttons stored for hit-test */
let MENU_RECTS=[];
let MENU_SAFE_RECTS=[];
let lastMenuActionAt=0;
function drawMenu(){
  MENU_RECTS=[]; MENU_SAFE_RECTS=[];
  if(!S.menu) return;
  const s=S.menu.slot;
  if(S.menu.locked){
    MENU_SAFE_RECTS.push({x:s.x-92,y:s.y-72,w:184,h:48});
    drawBubble(s.x,s.y-44,"完了。離れて戻ると再操作",null);
    return;
  }
  if(!S.menu.buttons.length) return;
  const bw=190, bh=44, gap=8, pad=10;
  const n=S.menu.buttons.length;
  const panelW=bw+pad*2, panelH=30+n*bh+(n-1)*gap+pad;
  let bx=clamp(s.x,panelW/2+8,W-panelW/2-8);
  let top=s.y-48-panelH;
  if(top<78) top=s.y+38;
  if(top+panelH>H-12) top=H-12-panelH;
  const left=bx-panelW/2;
  MENU_SAFE_RECTS.push({x:left,y:top,w:panelW,h:panelH});

  ctx.save();
  ctx.fillStyle="rgba(44,32,22,.88)";
  roundRect(left,top,panelW,panelH,14); ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle="rgba(255,231,154,.72)"; roundRect(left+1,top+1,panelW-2,panelH-2,13); ctx.stroke();
  const title = s.facilityId ? (S.facilities.find(f=>f.id===s.facilityId)?.name||"施設") : (s.kind==="road"?"道スロット":s.kind==="ground"?"高所スロット":"後方スロット");
  ctx.font="900 12px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillStyle="#f3e3bf";
  ctx.fillText(title,bx,top+16);
  S.menu.buttons.forEach((btn,i)=>{
    const y=top+30+i*(bh+gap);
    const rect={x:bx-bw/2,y,w:bw,h:bh,btn};
    MENU_RECTS.push(rect);
    const en=btn.enabled;
    const bg=en?(btn.color||"#f3e3bf"):"#cbbfa3";
    ctx.fillStyle=bg; roundRect(rect.x,rect.y,bw,bh,12); ctx.fill();
    ctx.lineWidth=2.5; ctx.strokeStyle=en?"#5e3c20":"#8b8067"; roundRect(rect.x,rect.y,bw,bh,12); ctx.stroke();
    ctx.fillStyle=en?(btn.color?"#23303f":"#2c2016"):"#7a6f55";
    ctx.font="900 15px sans-serif"; ctx.textAlign="left"; ctx.textBaseline="middle";
    ctx.fillText(btn.label, rect.x+13, y+bh/2);
    if(!btn.info){
      ctx.textAlign="right"; ctx.font="900 14px sans-serif";
      ctx.fillStyle = en?"#3a2a16":"#9a3b2f";
      ctx.fillText(btn.cost+"金", rect.x+bw-13, y+bh/2);
    }
  });
  ctx.restore();
  ctx.textBaseline="alphabetic";
}
function drawBubble(x,y,text,_c,small){
  ctx.save(); ctx.font=(small?"bold 11px ":"bold 12px ")+"sans-serif"; ctx.textAlign="center";
  const w=ctx.measureText(text).width+18;
  ctx.fillStyle="rgba(44,32,22,.9)"; roundRect(x-w/2,y-14,w,20,8); ctx.fill();
  ctx.fillStyle="#f3e3bf"; ctx.fillText(text,x,y); ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawBanner(){
  if(!S.banner) return;
  const b=S.banner, k=b.t/b.life;
  const a = k<0.15? k/0.15 : k>0.7? (1-k)/0.3 : 1;
  ctx.save(); ctx.globalAlpha=clamp(a,0,1); ctx.textAlign="center";
  const yy=H*0.32 - Math.sin(Math.min(1,k*2)*1.5)*6;
  ctx.font="900 34px sans-serif"; ctx.lineWidth=6; ctx.strokeStyle="rgba(0,0,0,.5)";
  ctx.strokeText(b.text,W/2,yy); ctx.fillStyle=b.color; ctx.fillText(b.text,W/2,yy);
  if(b.sub){ ctx.font="bold 15px sans-serif"; ctx.lineWidth=4; ctx.strokeText(b.sub,W/2,yy+24); ctx.fillStyle="#f3e3bf"; ctx.fillText(b.sub,W/2,yy+24); }
  ctx.restore();
}

/* =====================================================================
 * INPUT
 * ===================================================================== */
const cv=$("cv");
let lastBoardInputAt=0, lastBoardInputX=-999, lastBoardInputY=-999;
function canvasPoint(e){
  const r=cv.getBoundingClientRect();
  const src=(e.touches&&e.touches[0]) || (e.changedTouches&&e.changedTouches[0]) || e;
  const cx=src.clientX, cy=src.clientY;
  return { x:(cx-r.left)/r.width*W, y:(cy-r.top)/r.height*H };
}
function handleBoardInput(e){
  e.preventDefault();
  Audio2.init(); if(Audio2.ctx && Audio2.ctx.state==="suspended") Audio2.ctx.resume();
  if(settingsOpen) return;
  if(!S || S.status!=="playing" || paused) return;
  const p=canvasPoint(e);
  const now=performance.now();
  if(now-lastBoardInputAt<80 && dist(p.x,p.y,lastBoardInputX,lastBoardInputY)<8) return;
  lastBoardInputAt=now; lastBoardInputX=p.x; lastBoardInputY=p.y;
  // hit-test menu buttons first. Menu-area taps never become movement taps.
  for(const r of MENU_RECTS){
    if(p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h){
      if(r.btn.enabled){ doMenuAction(r.btn); lastMenuActionAt=now; }
      else { if(!r.btn.info){ S.message="金不足"; S.messageT=1200; addFloater("金不足",p.x,p.y-12,"#ff9a7a"); } }
      return;
    }
  }
  for(const r of MENU_SAFE_RECTS){
    if(p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h) return;
  }
  if(S.menu && S.menu.slot && dist(p.x,p.y,S.menu.slot.x,S.menu.slot.y)<74) return;
  if(now-lastMenuActionAt<220) return;
  // otherwise move king
  S.king.tx=clamp(p.x,14,W-14); S.king.ty=clamp(p.y,96,H-14);
}
if(window.PointerEvent){
  // pointerdown はマウス・タッチ・ペンを一本化して拾うため、これだけ登録すれば多重発火しない
  cv.addEventListener("pointerdown",handleBoardInput,{passive:false});
}else{
  // 旧ブラウザ向けフォールバック
  cv.addEventListener("mousedown",handleBoardInput,{passive:false});
  cv.addEventListener("touchstart",handleBoardInput,{passive:false});
}
window.addEventListener("keydown",e=>{
  const k=e.key.toLowerCase();
  if(k==="escape" && settingsOpen){ closeSettings(); e.preventDefault(); return; }
  if(k===" "||k==="p"){ togglePause(); e.preventDefault(); }
  if(k==="m") toggleMute();
  if(k==="f") toggleSpeed();
  if(k==="o") openSettings();
});

/* =====================================================================
 * STAGE SELECT / DIAGNOSTICS
 * ===================================================================== */
function stageDiagnostics(id){
  const st=STAGE_DEFS[id]||STAGE_DEFS.meadow;
  const routeCounts={}; let total=0;
  for(const w of st.waves){
    for(const g of w.groups){ routeCounts[g.route]=(routeCounts[g.route]||0)+g.count; total+=g.count; }
  }
  const slots=st.slots.length;
  const road=st.slots.filter(s=>s.kind==="road").length;
  const ground=st.slots.filter(s=>s.kind==="ground").length;
  const mine=st.slots.filter(s=>s.kind==="economy").length;
  const routeText=Object.entries(routeCounts).map(([k,v])=>`${st.routeLabels[k]||k}:${v}`).join(" / ");
  return {total,slots,road,ground,mine,routeText,waves:st.waves.length};
}
function safeStageId(id){ return (STAGE_DEFS[id] && isStageUnlocked(id)) ? id : normalizeSelectedStage(selectedStageId||"meadow"); }
function ensureStageSelectReady(sel){
  if(!sel) return safeStageId(selectedStageId||"meadow");
  if(!sel.options || sel.options.length===0) fillStageSelect(sel);
  let id = sel.value || selectedStageId || "meadow";
  id = safeStageId(id);
  sel.value = id;
  if(!sel.value && sel.options.length>0){
    sel.selectedIndex = Math.max(0,[...sel.options].findIndex(o=>!o.disabled));
    id = sel.value || safeStageId("meadow");
  }
  return id;
}
function fillStageSelect(sel){
  if(!sel) return;
  const keep=sel.value||selectedStageId||"meadow";
  const progress=normalizeProgress(getSaveData());
  sel.innerHTML="";
  for(const id of STAGE_ORDER){
    const st=STAGE_DEFS[id]; if(!st) continue;
    const unlocked=progress.unlockedStages.includes(id);
    const cleared=progress.clearedStages.includes(id);
    const o=document.createElement("option");
    o.value=st.id; o.disabled=!unlocked;
    o.textContent=`${unlocked?"":"🔒 "}${cleared?"★ ":""}${st.name} / ${st.difficulty} / ${Object.keys(st.routes).length}ルート`;
    sel.appendChild(o);
  }
  const next = STAGE_DEFS[keep] && isStageUnlocked(keep) ? keep : safeStageId(selectedStageId||"meadow");
  sel.value = next;
  if(!sel.value && sel.options.length>0){
    sel.selectedIndex = Math.max(0,[...sel.options].findIndex(o=>!o.disabled));
    selectedStageId = sel.value || "meadow";
  }
}
function renderStageMap(){
  const map=$("stageMap"); if(!map) return;
  const progress=normalizeProgress(getSaveData());
  const unlocked=new Set(progress.unlockedStages);
  const cleared=new Set(progress.clearedStages);
  map.innerHTML="";
  for(let i=0;i<STAGE_ORDER.length-1;i++){
    const a=STAGE_NODE_POS[STAGE_ORDER[i]], b=STAGE_NODE_POS[STAGE_ORDER[i+1]];
    if(!a||!b) continue;
    const line=document.createElement("div");
    const dx=b.x-a.x, dy=b.y-a.y;
    line.className="stage-map-line"+(cleared.has(STAGE_ORDER[i])?" done":"");
    line.style.left=a.x+"%"; line.style.top=a.y+"%";
    line.style.width=Math.hypot(dx,dy)+"%";
    line.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;
    map.appendChild(line);
  }
  for(const id of STAGE_ORDER){
    const st=STAGE_DEFS[id], pos=STAGE_NODE_POS[id]; if(!st||!pos) continue;
    const btn=document.createElement("button");
    const isUnlocked=unlocked.has(id), isCleared=cleared.has(id), isSelected=id===selectedStageId;
    const nextCandidate=isUnlocked && !isCleared && STAGE_ORDER.indexOf(id)===Math.min(...STAGE_ORDER.filter(x=>unlocked.has(x)&&!cleared.has(x)).map(x=>STAGE_ORDER.indexOf(x)).concat([999]));
    btn.type="button";
    btn.className=`stage-node ${isUnlocked?"":"locked"} ${isCleared?"cleared":""} ${isSelected?"selected":""} ${nextCandidate?"next":""}`;
    btn.style.left=pos.x+"%"; btn.style.top=pos.y+"%";
    btn.innerHTML=`<span class="stage-node-mark">${isCleared?"👑":isUnlocked?pos.icon:"🔒"}</span><span class="stage-node-name">${pos.short}</span>`;
    btn.title=isUnlocked?st.name:"前のステージをクリアすると解放";
    btn.onclick=()=>{ if(isUnlocked) chooseStage(id); else showLockedStageMessage(id); };
    map.appendChild(btn);
  }
}
function updateProgressText(){
  const el=$("progressText"); if(!el) return;
  const progress=normalizeProgress(getSaveData());
  el.textContent=`クリア ${progress.clearedStages.length}/${STAGE_ORDER.length} ・ 解放 ${progress.unlockedStages.length}/${STAGE_ORDER.length}`;
}
function updateStagePanel(){
  const st=selectedStage();
  const d=stageDiagnostics(st.id);
  const select=$("stageSelect"); if(select){ ensureStageSelectReady(select); if(select.value!==st.id) select.value=st.id; }
  const sselect=$("sStageSelect"); if(sselect){ ensureStageSelectReady(sselect); if(sselect.value!==st.id) sselect.value=st.id; }
  const chips=$("stageChips");
  if(chips){ chips.innerHTML=`<span class="stage-chip">${st.type}</span><span class="stage-chip">${Object.keys(st.routes).length}ルート</span><span class="stage-chip">${st.difficulty}</span><span class="stage-chip">推奨:${st.recommended}</span>`; }
  const desc=$("stageDesc"); if(desc) desc.textContent=st.summary;
  const diag=$("stageDiag"); if(diag) diag.textContent=`資金${st.startCoins} / 敵HPx${st.enemyMul.hp} / 床${d.slots}（柵${d.road}・火力${d.ground}・鉱${d.mine}） / 敵${d.total}: ${d.routeText}`;
  const sv=$("sStageVal"); if(sv) sv.textContent=S?"再開始時に反映":"開始時に反映";
  renderStageMap(); updateProgressText();
}
function showLockedStageMessage(id){
  const st=STAGE_DEFS[id];
  const desc=$("stageDesc"); if(desc) desc.textContent=`${st?st.name:"このステージ"} は未解放。前のステージをクリアすると進めます。`;
}
function chooseStage(id){
  if(!STAGE_DEFS[id]) return;
  if(!isStageUnlocked(id)){ showLockedStageMessage(id); return; }
  selectedStageId=id;
  saveGameData({selectedStageId:id});
  updateStagePanel();
  if(S && S.status==="playing"){
    S.message="ステージ変更は再開始で反映"; S.messageT=1600;
  }
}
function resetProgress(){
  if(!confirm("ステージ進行をリセットしますか？")) return;
  saveGameData({unlockedStages:["meadow"],clearedStages:[],selectedStageId:"meadow"});
  selectedStageId="meadow";
  fillStageSelect($("stageSelect")); fillStageSelect($("sStageSelect")); updateStagePanel();
}
function initStageSelectUi(){
  fillStageSelect($("stageSelect")); fillStageSelect($("sStageSelect")); updateStagePanel();
  const a=$("stageSelect"); if(a) a.onchange=()=>chooseStage(a.value);
  const b=$("sStageSelect"); if(b) b.onchange=()=>chooseStage(b.value);
  const r=$("bResetProgress"); if(r) r.onclick=resetProgress;
}

/* =====================================================================
 * LOOP / UI
 * ===================================================================== */
let _loopErrAt=0;
function loop(t){
  try{
    const dt=Math.min(48,t-last); last=t;
    if(S && !paused && !settingsOpen){ for(let i=0;i<speed;i++) update(dt); }
    render();
    syncHud();
    if(settingsOpen) syncSettingsPanel();
  }catch(err){
    // 1フレームの例外でループ全体が止まらないようにする（無音握りつぶしはせず間引いてログ）
    const n=performance.now(); if(n-_loopErrAt>1000){ _loopErrAt=n; console.error("[loop] uncaught error (game continues):",err); }
  }
  requestAnimationFrame(loop);
}
function syncSettingsPanel(){
  const speedText=speed+"x";
  const sp=$("sSpeedVal"); if(sp) sp.textContent=speedText;
  const sb=$("sSpeed"); if(sb) sb.textContent="速度 "+speedText;
  const pp=$("sPauseVal"); if(pp) pp.textContent=paused?"停止中":"進行中";
  const pb=$("sPause"); if(pb) pb.textContent=paused?"再開":"一時停止";
  const mv=$("sMuteVal"); if(mv) mv.textContent=Audio2.muted?"OFF":"ON";
  const mb=$("sMute"); if(mb) mb.textContent=Audio2.muted?"音: OFF":"音: ON";
  updateStagePanel();
}
function openSettings(){
  if(!S || S.status!=="playing") return;
  settingsPausedBefore=paused;
  settingsOpen=true;
  paused=true;
  $("ovSettings").classList.add("show");
  syncSettingsPanel();
}
function closeSettings(){
  settingsOpen=false;
  $("ovSettings").classList.remove("show");
  paused=settingsPausedBefore;
  syncSettingsPanel();
}
function restartGameFromSettings(){
  $("ovSettings").classList.remove("show");
  $("ovEnd").classList.remove("show");
  settingsOpen=false; settingsPausedBefore=false;
  S=newState(); paused=false;
  syncSettingsPanel();
}
function syncHud(){
  if(!S) return;
  $("coinVal").textContent=Math.floor(S.coins);
  $("waveVal").textContent=`${Math.max(0,S.waveIdx+1)}/${WAVES.length}`;
  const pct=clamp(S.castleHp/S.castleMax,0,1);
  $("hpfill").style.width=(pct*100)+"%";
  $("hptext").textContent=`城 ${Math.round(pct*100)}%`;
  // hint line
  const h=$("hint");
  if(S.messageT>0 && S.message){ h.textContent=S.message; h.classList.add("show"); }
  else h.classList.remove("show");
}
function togglePause(){ paused=!paused; syncSettingsPanel(); }
function toggleSpeed(){ speed=speed===1?2:1; syncSettingsPanel(); }
function toggleMute(){ Audio2.muted=!Audio2.muted; syncSettingsPanel(); if(S) saveBest(); else saveGameData({muted:Audio2.muted}); }
$("bMenu").onclick=openSettings;
$("sClose").onclick=closeSettings;
$("sSpeed").onclick=toggleSpeed;
$("sPause").onclick=togglePause;
$("sMute").onclick=toggleMute;
$("sRetry").onclick=restartGameFromSettings;

function showEnd(won){
  $("endTitle").textContent=won?"防衛成功":"陥落";
  $("endSub").textContent=won?"次の前線が開いた":`ウェーブ ${S.waveIdx+1} で城が落ちた`;
  let best=0; try{ best=(getSaveData().bestWave)||0; }catch(e){}
  const next=S.nextStageId ? STAGE_DEFS[S.nextStageId] : null;
  $("endBody").innerHTML = won
    ? next
      ? `${S.stageName} を突破。<br><b>${next.name}</b> が解放された。次の前線へ進める。`
      : `${S.stageName} 全 ${WAVES.length} ウェーブ突破。<br>すべての前線を守り抜いた。`
    : `到達ウェーブ <b>${S.waveIdx+1}</b> / ${WAVES.length}（最高記録 ${Math.max(best,S.waveIdx+1)}）。<br>柵・火力・金鉱の優先順位を見直す。`;
  const bn=$("bNext"); if(bn){ bn.style.display=(won&&next)?"block":"none"; bn.textContent=next?`次へ: ${next.name}`:"次のステージへ"; }
  const br=$("bRetry"); if(br) br.textContent=won?"同じステージをもう一度":"もう一度";
  const bm=$("bMap"); if(bm) bm.style.display="block";
  $("ovEnd").classList.add("show");
}
function beginGame(id){
  const fallback = ensureStageSelectReady($("stageSelect"));
  const startId = safeStageId(id || fallback || selectedStageId || "meadow");
  chooseStage(startId);
  Audio2.init(); if(Audio2.ctx && Audio2.ctx.state==="suspended") Audio2.ctx.resume();
  $("ovStart").classList.remove("show"); $("ovEnd").classList.remove("show");
  S=newState(); paused=false; settingsOpen=false; settingsPausedBefore=false; syncSettingsPanel();
}
$("bRetry").onclick=()=>{ const id=(S&&S.stageId)||selectedStageId; beginGame(id); };
$("bNext").onclick=()=>{ if(S&&S.nextStageId) beginGame(S.nextStageId); };
$("bMap").onclick=()=>{ $("ovEnd").classList.remove("show"); S=null; paused=false; settingsOpen=false; settingsPausedBefore=false; $("ovStart").classList.add("show"); fillStageSelect($("stageSelect")); fillStageSelect($("sStageSelect")); updateStagePanel(); };
$("bStart").onclick=()=>{
  const ss=$("stageSelect");
  const id=ensureStageSelectReady(ss) || selectedStageId || "meadow";
  beginGame(id);
};

/* boot */
function boot(){
  ctx=cv.getContext("2d");
  // wire HUD icons
  if(ready("coin")) $("coinIcon").src=IMG_SRC.coin; else $("coinIcon").style.display="none";
  if(ready("wave")) $("waveIcon").src=IMG_SRC.wave; else $("waveIcon").style.display="none";
  try{ const sv=getSaveData(); if(sv.muted){ Audio2.muted=true; } selectedStageId=normalizeSelectedStage(sv.selectedStageId||selectedStageId); }catch(e){}
  // Do not clear S here. On slow mobile connections the player may press start
  // before all image assets finish loading; beginGame() already creates S.
  // The previous boot path reset S to null after hiding the start overlay, leaving
  // only the map/background visible and no characters.
  if(!S) S=null;
  initStageSelectUi();
  syncSettingsPanel();
  requestAnimationFrame(loop);
}
ctx=cv.getContext("2d");
$("coinIcon").src=IMG_SRC.coin; $("waveIcon").src=IMG_SRC.wave;
try{ initStageSelectUi(); }catch(e){ console.warn("stage select preinit failed",e); }
loadAll(()=>{ const f=$("loadfill"); if(f) f.style.width="100%"; boot(); });

})();
</script>
